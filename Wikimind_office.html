<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WikiMind Office</title>

    <!-- Tailwind & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Space Grotesk', 'sans-serif'] },
                    colors: {
                        glass: { panel: 'rgba(20, 20, 20, 0.6)', border: 'rgba(255, 255, 255, 0.08)' },
                        brand: { 500: '#6366f1', 600: '#4f46e5', glow: '#818cf8' },
                        // Couleurs Office (utilisées uniquement pour les icônes maintenant)
                        office: {
                            writer: '#3b82f6', 
                            calc: '#22c55e',   
                            impress: '#f97316',
                            draw: '#a855f7'    
                        }
                    },
                    animation: { 'fade-in-up': 'fadeInUp 0.5s ease-out forwards' },
                    keyframes: { fadeInUp: { '0%': { opacity: 0, transform: 'translateY(10px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } } }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: #ffffff; overflow-x: hidden; }
        .glass-panel {
            background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        
        /* NOUVEAU STYLE CARTE MODERNE */
        .app-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .app-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-4px);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }
        
        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="selection:bg-brand-500 selection:text-white">

    <!-- AURORA BG -->
    <canvas id="aurora-bg" class="fixed top-0 left-0 w-full h-full -z-10"></canvas>

    <!-- NAVBAR -->
    <nav class="fixed top-0 w-full z-50 px-6 py-6 transition-all duration-300">
        <div class="max-w-7xl mx-auto flex justify-between items-center glass-panel rounded-full px-6 py-3">
            <a href="index.html" class="flex items-center gap-3 group">
                <div class="w-8 h-8 bg-gradient-to-tr from-white to-gray-400 rounded-lg flex items-center justify-center">
                    <span class="font-bold text-black text-xs">W</span>
                </div>
                <span class="font-display font-bold text-lg tracking-tight">WikiMind <span class="text-white/40 font-normal">Office</span></span>
            </a>

            <!-- Status de Stockage -->
            <div id="storage-status" class="hidden md:flex items-center gap-2 px-3 py-1 rounded-full bg-white/5 border border-white/10 text-[10px] uppercase tracking-wider">
                <span class="w-2 h-2 rounded-full bg-gray-500" id="status-dot"></span>
                <span id="status-text">Mode Invité (Local)</span>
            </div>

            <!-- Auth State -->
            <div id="auth-container" class="flex items-center gap-4">
                <a href="Wikimind_user.html" id="login-btn" class="px-5 py-2 rounded-full bg-white text-black font-bold text-xs uppercase tracking-wider hover:bg-gray-200 transition-colors">
                    Connexion
                </a>
                <div id="user-logged" class="hidden flex items-center gap-3">
                    <a href="Wikimind_user.html" class="relative group">
                        <img id="nav-avatar" src="" class="w-9 h-9 rounded-full border border-white/20 object-cover bg-gray-800">
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="relative pt-32 pb-20 px-4 md:px-6 max-w-7xl mx-auto">
        
        <!-- HEADER -->
        <div class="mb-12 animate-fade-in-up">
            <h1 class="text-4xl md:text-5xl font-display font-bold mb-4">Espace de travail</h1>
            <p class="text-white/60 max-w-2xl text-lg">Suite bureautique cloud & locale. <br>
                <span id="guest-warning" class="text-yellow-400/80 text-sm hidden">⚠️ Mode Invité : Fichiers conservés 3 jours uniquement.</span>
            </p>
        </div>

        <!-- APP LAUNCHER (Grid moderne) -->
        <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-16 animate-fade-in-up" style="animation-delay: 0.1s;">
            <!-- WRITER -->
            <button onclick="openCreateModal('writer')" class="app-card rounded-2xl p-6 text-left group">
                <div class="w-12 h-12 rounded-xl bg-white/5 flex items-center justify-center text-2xl mb-4 text-white group-hover:text-office-writer group-hover:scale-110 transition-all duration-300">
                    <i class="fa-solid fa-file-word"></i>
                </div>
                <h3 class="font-display font-bold text-lg group-hover:text-white transition-colors">Writer</h3>
                <p class="text-white/30 text-xs mt-1 group-hover:text-white/60 transition-colors">Documents texte</p>
            </button>

            <!-- CALC -->
            <button onclick="openCreateModal('calc')" class="app-card rounded-2xl p-6 text-left group">
                <div class="w-12 h-12 rounded-xl bg-white/5 flex items-center justify-center text-2xl mb-4 text-white group-hover:text-office-calc group-hover:scale-110 transition-all duration-300">
                    <i class="fa-solid fa-table"></i>
                </div>
                <h3 class="font-display font-bold text-lg group-hover:text-white transition-colors">Calc</h3>
                <p class="text-white/30 text-xs mt-1 group-hover:text-white/60 transition-colors">Feuilles de calcul</p>
            </button>

            <!-- IMPRESS -->
            <button onclick="openCreateModal('impress')" class="app-card rounded-2xl p-6 text-left group">
                <div class="w-12 h-12 rounded-xl bg-white/5 flex items-center justify-center text-2xl mb-4 text-white group-hover:text-office-impress group-hover:scale-110 transition-all duration-300">
                    <i class="fa-solid fa-presentation-screen"></i>
                </div>
                <h3 class="font-display font-bold text-lg group-hover:text-white transition-colors">Impress</h3>
                <p class="text-white/30 text-xs mt-1 group-hover:text-white/60 transition-colors">Présentations</p>
            </button>

            <!-- DRAW -->
            <button onclick="openCreateModal('draw')" class="app-card rounded-2xl p-6 text-left group">
                <div class="w-12 h-12 rounded-xl bg-white/5 flex items-center justify-center text-2xl mb-4 text-white group-hover:text-office-draw group-hover:scale-110 transition-all duration-300">
                    <i class="fa-solid fa-pen-ruler"></i>
                </div>
                <h3 class="font-display font-bold text-lg group-hover:text-white transition-colors">Draw</h3>
                <p class="text-white/30 text-xs mt-1 group-hover:text-white/60 transition-colors">Dessin vectoriel</p>
            </button>
        </section>

        <!-- RECENT FILES LIST -->
        <section class="animate-fade-in-up" style="animation-delay: 0.2s;">
            <div class="flex justify-between items-end mb-6 border-b border-white/10 pb-4">
                <h2 class="text-xl font-display font-bold">Récemment ouverts</h2>
                <div class="flex gap-2 text-xs opacity-50">
                    <i class="fa-solid fa-sort"></i> Tri par date
                </div>
            </div>

            <!-- Container des fichiers -->
            <div id="files-container" class="space-y-2 min-h-[200px]">
                <div class="text-center py-12 text-white/20">
                    <i class="fa-solid fa-circle-notch fa-spin text-2xl mb-3"></i>
                    <p>Chargement de vos documents...</p>
                </div>
            </div>
        </section>

    </main>

    <!-- MODAL CREATE FILE -->
    <div id="create-modal" class="modal">
        <div class="glass-panel p-8 rounded-2xl w-full max-w-md relative animate-fade-in-up border border-white/10">
            <button onclick="closeCreateModal()" class="absolute top-4 right-4 text-white/40 hover:text-white">
                <i class="fa-solid fa-xmark"></i>
            </button>
            
            <h3 class="text-xl font-bold mb-6 flex items-center gap-3">
                <span id="modal-icon" class="text-brand-500"></span>
                Nouveau Document
            </h3>

            <div class="mb-4">
                <label class="text-xs text-white/40 uppercase font-bold tracking-wider mb-2 block">Nom du fichier</label>
                <input type="text" id="new-filename" placeholder="Ex: Rapport 2024" 
                    class="w-full bg-black/40 border border-white/10 rounded-lg p-3 text-white focus:outline-none focus:border-brand-500 focus:bg-white/5 transition-all">
            </div>
            
            <input type="hidden" id="selected-app-type">

            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeCreateModal()" class="px-4 py-2 rounded-lg text-white/60 hover:bg-white/5 text-sm transition-colors">Annuler</button>
                <button onclick="createNewFile()" class="px-6 py-2 rounded-lg bg-brand-600 hover:bg-brand-500 text-white font-bold text-sm shadow-lg shadow-brand-500/20 transition-all transform hover:scale-105">
                    Créer & Ouvrir
                </button>
            </div>
        </div>
    </div>

    <!-- FIREBASE LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, push, onValue, set, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // CONFIG USER
        const firebaseConfig = {
            apiKey: "AIzaSyD6qIOtKSx0Sl1Ht_a6ppLiMdKZRCc75tA",
            authDomain: "wikimind-3-comments.firebaseapp.com",
            databaseURL: "https://wikimind-3-comments-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "wikimind-3-comments",
            storageBucket: "wikimind-3-comments.firebasestorage.app",
            messagingSenderId: "137479541640",
            appId: "1:137479541640:web:4ed2510a9908055052e03d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // STATE
        let currentUser = null;
        const filesContainer = document.getElementById('files-container');

        // UI ELEMENTS
        const loginBtn = document.getElementById('login-btn');
        const userLogged = document.getElementById('user-logged');
        const navAvatar = document.getElementById('nav-avatar');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const guestWarning = document.getElementById('guest-warning');

        // --- AUTH & LOAD LOGIC ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // LOGGED IN
                currentUser = user;
                updateUIState(true);
                loadFilesFromFirebase(user.uid);
            } else {
                // GUEST
                currentUser = null;
                updateUIState(false);
                loadFilesFromLocal();
            }
        });

        function updateUIState(isLoggedIn) {
            if (isLoggedIn) {
                loginBtn.classList.add('hidden');
                userLogged.classList.remove('hidden');
                userLogged.classList.add('flex');
                
                const photoUrl = currentUser.photoURL || `https://ui-avatars.com/api/?name=${currentUser.email}&background=6366f1&color=fff`;
                navAvatar.src = photoUrl;

                statusDot.classList.replace('bg-gray-500', 'bg-green-400');
                statusText.innerText = "Cloud Sécurisé";
                guestWarning.classList.add('hidden');
            } else {
                loginBtn.classList.remove('hidden');
                userLogged.classList.add('hidden');
                
                statusDot.classList.replace('bg-green-400', 'bg-yellow-400');
                statusText.innerText = "Mode Invité (Local)";
                guestWarning.classList.remove('hidden');
            }
        }

        // --- FILE MANAGEMENT ---

        function loadFilesFromFirebase(uid) {
            const userFilesRef = ref(db, `users/${uid}/files`);
            onValue(userFilesRef, (snapshot) => {
                filesContainer.innerHTML = '';
                const data = snapshot.val();
                if (data) {
                    const entries = Object.entries(data).map(([key, val]) => ({ id: key, ...val }));
                    entries.sort((a, b) => b.updatedAt - a.updatedAt);
                    renderFiles(entries, 'firebase');
                } else {
                    renderEmptyState();
                }
            }, (error) => {
                console.error("Erreur DB:", error);
                filesContainer.innerHTML = '<div class="text-red-400 text-center text-sm">Erreur de chargement.</div>';
            });
        }

        function loadFilesFromLocal() {
            filesContainer.innerHTML = '';
            const raw = localStorage.getItem('wikimind_guest_files');
            let files = raw ? JSON.parse(raw) : {};

            const now = Date.now();
            const threeDaysMs = 3 * 24 * 60 * 60 * 1000;
            let changed = false;

            Object.keys(files).forEach(key => {
                if (now - files[key].updatedAt > threeDaysMs) {
                    delete files[key];
                    changed = true;
                }
            });

            if (changed) localStorage.setItem('wikimind_guest_files', JSON.stringify(files));

            const entries = Object.entries(files).map(([key, val]) => ({ id: key, ...val }));
            entries.sort((a, b) => b.updatedAt - a.updatedAt);

            if (entries.length > 0) renderFiles(entries, 'local');
            else renderEmptyState();
        }

        function renderFiles(files, source) {
            filesContainer.innerHTML = '';
            files.forEach(file => {
                const icon = getAppIcon(file.type);
                const color = getAppColor(file.type);
                const dateStr = new Date(file.updatedAt).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short', hour: '2-digit', minute:'2-digit' });

                const div = document.createElement('div');
                div.className = "group flex items-center justify-between p-4 rounded-xl hover:bg-white/5 transition-all cursor-pointer border border-transparent hover:border-white/5";
                
                div.innerHTML = `
                    <div class="flex items-center gap-4 flex-1" onclick="openFile('${file.type}', '${file.id}', '${source}')">
                        <div class="w-10 h-10 rounded-lg flex items-center justify-center text-lg bg-white/5 text-white/50 group-hover:text-white transition-colors">
                            <i class="${icon}" style="color: ${color}"></i>
                        </div>
                        <div>
                            <h4 class="font-bold text-sm text-white/90 group-hover:text-white transition-colors">${file.name}</h4>
                            <p class="text-[10px] text-white/40 uppercase tracking-wide mt-0.5">${file.type} • ${dateStr}</p>
                        </div>
                    </div>
                    <button onclick="deleteFile('${file.id}', '${source}')" class="opacity-0 group-hover:opacity-100 w-8 h-8 rounded-full hover:bg-white/10 flex items-center justify-center text-white/40 hover:text-red-400 transition-all">
                        <i class="fa-solid fa-trash text-xs"></i>
                    </button>
                `;
                filesContainer.appendChild(div);
            });
        }

        function renderEmptyState() {
            filesContainer.innerHTML = `
                <div class="text-center py-12 border border-dashed border-white/5 rounded-2xl bg-white/0">
                    <div class="text-3xl mb-3 opacity-20 grayscale">📂</div>
                    <p class="text-white/40 text-sm">Aucun document récent.</p>
                </div>
            `;
        }

        // --- ACTIONS ---

        window.openCreateModal = (type) => {
            const modal = document.getElementById('create-modal');
            const iconContainer = document.getElementById('modal-icon');
            const hiddenInput = document.getElementById('selected-app-type');
            
            modal.classList.add('active');
            hiddenInput.value = type;
            document.getElementById('new-filename').value = `Nouveau ${type.charAt(0).toUpperCase() + type.slice(1)}`;
            setTimeout(() => document.getElementById('new-filename').focus(), 100);

            let iconClass = getAppIcon(type);
            let color = getAppColor(type);
            iconContainer.innerHTML = `<i class="${iconClass}" style="color:${color}"></i>`;
        };

        window.closeCreateModal = () => {
            document.getElementById('create-modal').classList.remove('active');
        };

        window.createNewFile = async () => {
            const nameInput = document.getElementById('new-filename');
            const name = nameInput.value.trim() || "Sans titre";
            const type = document.getElementById('selected-app-type').value;
            const timestamp = Date.now();
            
            // Animation chargement bouton
            const btn = document.querySelector('#create-modal button:last-child');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Création...';

            const fileData = {
                name: name,
                type: type,
                createdAt: timestamp,
                updatedAt: timestamp,
                content: "" 
            };

            let fileId = "";
            let source = "";

            if (currentUser) {
                // FIREBASE CREATE
                const newRef = push(ref(db, `users/${currentUser.uid}/files`));
                await set(newRef, fileData);
                fileId = newRef.key;
                source = "firebase";
            } else {
                // LOCAL CREATE
                fileId = "local_" + timestamp;
                source = "local";
                const raw = localStorage.getItem('wikimind_guest_files');
                let files = raw ? JSON.parse(raw) : {};
                files[fileId] = fileData;
                localStorage.setItem('wikimind_guest_files', JSON.stringify(files));
            }

            // REDIRECTION AUTOMATIQUE
            redirectToApp(type, fileId, source);
        };

        window.deleteFile = (id, source) => {
            if (!confirm("Supprimer ce fichier définitivement ?")) return;

            if (source === 'firebase' && currentUser) {
                remove(ref(db, `users/${currentUser.uid}/files/${id}`));
            } else if (source === 'local') {
                const raw = localStorage.getItem('wikimind_guest_files');
                let files = raw ? JSON.parse(raw) : {};
                delete files[id];
                localStorage.setItem('wikimind_guest_files', JSON.stringify(files));
                loadFilesFromLocal();
            }
        };

        window.openFile = (type, id, source) => {
            redirectToApp(type, id, source);
        };

        // --- FONCTION DE REDIRECTION ---
        function redirectToApp(type, id, source) {
            let page = "";
            
            // Mapping des noms de fichiers
            switch(type) {
                case 'writer': page = "Wikimind_writter.html"; break; // Orthographe demandée
                case 'calc': page = "Wikimind_calc.html"; break;
                case 'impress': page = "Wikimind_impress.html"; break;
                case 'draw': page = "Wikimind_draw.html"; break;
                default: page = "Wikimind_writter.html";
            }

            // Construction de l'URL avec paramètres
            const url = `${page}?id=${id}&source=${source}`;
            window.location.href = url;
        }

        // Helpers Visuels
        function getAppIcon(type) {
            switch(type) {
                case 'writer': return 'fa-solid fa-file-word';
                case 'calc': return 'fa-solid fa-table';
                case 'impress': return 'fa-solid fa-presentation-screen';
                case 'draw': return 'fa-solid fa-pen-ruler';
                default: return 'fa-solid fa-file';
            }
        }

        function getAppColor(type) {
            switch(type) {
                case 'writer': return '#3b82f6';
                case 'calc': return '#22c55e';
                case 'impress': return '#f97316';
                case 'draw': return '#a855f7';
                default: return '#ffffff';
            }
        }

        // AURORA BG
        const canvas = document.getElementById('aurora-bg');
        if(canvas) {
            const ctx = canvas.getContext('2d');
            let width, height;
            const orbs = [
                { x: 0.2, y: 0.2, r: 0.4, color: 'rgba(79, 70, 229, 0.15)', vx: 0.0005, vy: 0.0005 },
                { x: 0.8, y: 0.3, r: 0.5, color: 'rgba(59, 130, 246, 0.15)', vx: -0.0006, vy: 0.0004 }
            ];
            function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
            function animate() {
                ctx.clearRect(0, 0, width, height);
                ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, width, height);
                orbs.forEach(orb => {
                    orb.x += orb.vx; orb.y += orb.vy;
                    if(orb.x < -0.2 || orb.x > 1.2) orb.vx *= -1;
                    if(orb.y < -0.2 || orb.y > 1.2) orb.vy *= -1;
                    const g = ctx.createRadialGradient(orb.x * width, orb.y * height, 0, orb.x * width, orb.y * height, orb.r * width);
                    g.addColorStop(0, orb.color); g.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = g; ctx.fillRect(0, 0, width, height);
                });
                requestAnimationFrame(animate);
            }
            window.addEventListener('resize', resize); resize(); animate();
        }

    </script>
</body>
</html>
