<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wikimind CSGO</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    
    <!-- Import Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>
    <!-- Écran de connexion -->
    <div id="ui-layer">
        <div id="login-screen">
            <h1>WIKIMIND CSGO</h1>
            <p>Initialisation du moteur 3D...</p>
            <button id="btn-play">JOUER</button>
        </div>
        
        <!-- HUD et Contrôles Mobiles -->
        <div id="hud" style="display: none;">
            <div id="crosshair"></div>
            <!-- Zone tactile gauche (Mouvement) -->
            <div id="touch-zone-left">
                <div id="joystick-base"><div id="joystick-stick"></div></div>
            </div>
            <!-- Zone tactile droite (Caméra / Tir) -->
            <div id="touch-zone-right">
                <button id="btn-shoot">TIRER</button>
                <button id="btn-jump">SAUT</button>
            </div>
        </div>
    </div>

    <!-- Conteneur 3D -->
    <div id="game-container"></div>

    <!-- Script principal -->
    <script type="module" src="game/main.js"></script>

    <!-- PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('CSGO-sw.js');
        }
    </script>
</body>
</html>
