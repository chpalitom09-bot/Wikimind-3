<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="WikiMind Models — Testez tous les modèles d'IA Mistral en temps réel">
<meta name="theme-color" content="#ffffff">
<title>WikiMind Models</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-theme">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-dark" disabled>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
:root{--bg:#ffffff;--text:#111111;--sidebar:#fcfcfc;--border:#f0f0f0;--border2:#e5e7eb;--bubble-user:#555555;--input-bg:#ffffff;--select-bg:#f3f4f6;--card-hover:#f9fafb;--accent:#111111;--accent-inv:#ffffff;}
.dark-mode{--bg:#0f0f0f;--text:#eeeeee;--sidebar:#161616;--border:#252525;--border2:#2d2d2d;--bubble-user:#aaaaaa;--input-bg:#1a1a1a;--select-bg:#2a2a2a;--card-hover:#1f1f1f;--accent:#ffffff;--accent-inv:#111111;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;transition:background .3s,color .3s;}
a{text-decoration:none;color:inherit;}

/* SIDEBAR */
#sidebar{width:272px;min-width:272px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:margin .35s cubic-bezier(.4,0,.2,1);z-index:50;flex-shrink:0;margin-left:-272px;}
#sidebar.open{margin-left:0;}
#sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:49;}
@media(max-width:768px){#sidebar-backdrop.show{display:block;}}
.sb-header{padding:20px 16px 14px;border-bottom:1px solid var(--border);}
.sb-logo{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
.sb-logo h1{font-size:16px;font-weight:900;letter-spacing:-.04em;text-transform:uppercase;font-style:italic;}
.sb-logo-sub{font-size:10px;color:#999;font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-top:1px;}
.sb-close{color:#aaa;cursor:pointer;padding:4px;border-radius:6px;transition:.2s;background:none;border:none;}
.sb-close:hover{color:var(--text);background:var(--select-bg);}
.sb-nav{padding:12px 10px;display:flex;flex-direction:column;gap:4px;}
.sb-btn{width:100%;padding:9px 12px;border-radius:10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;text-align:left;display:flex;align-items:center;gap:9px;transition:.2s;border:none;background:none;color:var(--text);}
.sb-btn:hover{background:var(--select-bg);}
.sb-btn.primary{background:var(--accent);color:var(--accent-inv);}
.sb-btn.primary:hover{opacity:.85;}
.sb-btn svg{width:15px;height:15px;flex-shrink:0;}
.sb-section{padding:8px 12px 4px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.15em;color:#999;}
#history-list{flex:1;overflow-y:auto;padding:0 8px 8px;}
#history-list::-webkit-scrollbar{width:3px;}
#history-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.history-item{display:flex;align-items:center;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:12px;color:#888;gap:8px;transition:.2s;}
.history-item:hover{background:var(--border);color:var(--text);}
.history-item.active{background:var(--select-bg);color:var(--text);}
.history-item-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.history-item-del{opacity:0;color:#ccc;font-size:14px;transition:.2s;cursor:pointer;flex-shrink:0;background:none;border:none;padding:0 2px;}
.history-item:hover .history-item-del{opacity:1;}
.history-item-del:hover{color:#ef4444;}
.history-model-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:1px 5px;border-radius:4px;background:var(--select-bg);color:#888;flex-shrink:0;}
.sb-bottom{padding:12px 10px;border-top:1px solid var(--border);flex-shrink:0;}
.user-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;cursor:pointer;transition:.2s;}
.user-row:hover{background:var(--select-bg);}
.user-info{flex:1;min-width:0;}
.user-name{font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.user-plan-label{font-size:10px;color:#999;}
.plan-badge{font-size:9px;font-weight:800;text-transform:uppercase;padding:2px 6px;border-radius:20px;letter-spacing:.04em;}
.plan-free{background:#f3f4f6;color:#6b7280;}
.plan-plus{background:#dbeafe;color:#1d4ed8;}
.plan-pro{background:#ede9fe;color:#7c3aed;}
.plan-premium{background:#fef3c7;color:#d97706;}
.plan-premium-plus{background:linear-gradient(135deg,#fee2e2,#fef3c7);color:#c2410c;}
.dark-mode .plan-free{background:#27272a;color:#a1a1aa;}
.dark-mode .plan-plus{background:#1e3a5f;color:#60a5fa;}
.dark-mode .plan-pro{background:#3b1f5e;color:#c084fc;}
.dark-mode .plan-premium{background:#44330f;color:#fbbf24;}
.dark-mode .plan-premium-plus{background:linear-gradient(135deg,#44110f,#44330f);color:#fb923c;}

/* MAIN */
#main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
#chat-area{flex:1;position:relative;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:var(--bg);}
.float-btns{position:absolute;top:20px;left:20px;z-index:50;display:flex;gap:8px;}
.float-btn{width:34px;height:34px;border-radius:50%;background:var(--bg);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:.2s;color:var(--text);}
.float-btn:hover{background:var(--select-bg);transform:scale(1.05);}
.float-btn svg{width:15px;height:15px;}

/* TOP BAR MODEL SELECTOR */
#top-bar{position:absolute;top:0;left:0;right:0;z-index:40;display:flex;align-items:center;justify-content:center;padding:16px 80px;pointer-events:none;}
#model-selector-wrap{pointer-events:all;position:relative;}
#model-btn{display:flex;align-items:center;gap:8px;padding:7px 14px 7px 10px;background:var(--select-bg);border:1.5px solid var(--border2);border-radius:12px;font-size:12px;font-weight:700;color:var(--text);cursor:pointer;transition:.2s;font-family:'Inter',sans-serif;text-transform:uppercase;letter-spacing:.05em;max-width:280px;}
#model-btn:hover{background:var(--border2);}
#model-btn svg{width:14px;height:14px;flex-shrink:0;}
.model-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
#model-dropdown{position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--bg);border:1.5px solid var(--border2);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.12);padding:8px;min-width:280px;max-width:340px;z-index:100;display:none;max-height:70vh;overflow-y:auto;}
#model-dropdown.open{display:block;animation:ddIn .18s cubic-bezier(.4,0,.2,1);}
@keyframes ddIn{from{opacity:0;transform:translateX(-50%) translateY(-6px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.dd-section{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:#aaa;padding:8px 10px 4px;}
.dd-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;cursor:pointer;transition:.15s;font-size:12px;font-weight:600;color:var(--text);}
.dd-item:hover{background:var(--select-bg);}
.dd-item.active{background:var(--select-bg);}
.dd-item-info{flex:1;min-width:0;}
.dd-item-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dd-item-sub{font-size:10px;color:#999;margin-top:1px;}
.dd-item-lock{font-size:10px;color:#aaa;font-weight:600;white-space:nowrap;}

/* PLAN CHIP */
#plan-chip{position:absolute;top:20px;right:20px;z-index:50;display:flex;align-items:center;gap:8px;cursor:pointer;}
.plan-chip-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--text);overflow:visible;flex-shrink:0;cursor:pointer;position:relative;}
.plan-chip-avatar img{width:30px;height:30px;object-fit:cover;border-radius:50%;position:relative;z-index:2;}
.plan-chip-avatar>span{position:relative;z-index:2;}
.plan-chip-avatar::after{content:'';position:absolute;inset:-3px;border-radius:50%;z-index:0;}
.plan-chip-avatar::before{content:'';position:absolute;inset:2px;border-radius:50%;z-index:1;background:var(--bg);}
.ring-free::after{background:conic-gradient(#9ca3af,#d1d5db,#9ca3af);}
.ring-plus::after{background:conic-gradient(#111,#555,#111,#555,#111);animation:ringRotate 4s linear infinite;}
.dark-mode .ring-plus::after{background:conic-gradient(#fff,#aaa,#fff,#aaa,#fff);animation:ringRotate 4s linear infinite;}
.ring-pro::after{background:conic-gradient(#22c55e,#4ade80,#16a34a,#86efac,#22c55e);animation:ringRotate 3s linear infinite;}
.ring-premium::after{background:conic-gradient(#f59e0b,#fcd34d,#d97706,#fef08a,#f59e0b);animation:ringRotate 2.5s linear infinite;}
.ring-premium-plus::after{background:conic-gradient(#ef4444,#f97316,#eab308,#f97316,#ef4444);animation:ringRotateFire 1.8s linear infinite;}
@keyframes ringRotate{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes ringRotateFire{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}

/* PLAN CHIP MENU */
#plan-chip-menu{position:absolute;top:calc(100% + 10px);right:0;background:var(--bg);border:1.5px solid var(--border2);border-radius:18px;box-shadow:0 8px 32px rgba(0,0,0,.12);padding:16px;min-width:220px;z-index:200;opacity:0;pointer-events:none;transform:translateY(-8px) scale(.97);transition:all .2s cubic-bezier(.4,0,.2,1);}
#plan-chip-menu.open{opacity:1;pointer-events:auto;transform:translateY(0) scale(1);}
.pcm-avatar{width:48px;height:48px;border-radius:50%;background:var(--select-bg);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;margin:0 auto 10px;overflow:hidden;}
.pcm-name{font-size:14px;font-weight:800;text-align:center;margin-bottom:4px;}
.pcm-plan{text-align:center;margin-bottom:14px;}
.pcm-divider{height:1px;background:var(--border);margin:10px 0;}
.pcm-btn{width:100%;padding:9px 12px;border-radius:10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;border:none;background:none;color:var(--text);text-align:left;transition:.2s;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:8px;}
.pcm-btn:hover{background:var(--select-bg);}
.pcm-btn svg{width:14px;height:14px;}
.pcm-btn.danger{color:#ef4444;}
.pcm-btn.danger:hover{background:rgba(239,68,68,.08);}

/* MESSAGES */
#messages-wrap{flex:1;overflow-y:auto;padding:80px 0 0;}
#messages-wrap::-webkit-scrollbar{width:4px;}
#messages-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
#messages{max-width:740px;margin:0 auto;padding:20px 24px 20px;display:flex;flex-direction:column;gap:24px;}
.welcome-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px 40px;text-align:center;gap:16px;}
.welcome-logo{font-size:32px;font-weight:900;letter-spacing:-.06em;text-transform:uppercase;font-style:italic;}
.welcome-logo span{opacity:.35;}
.welcome-sub{font-size:13px;color:#888;font-weight:500;max-width:400px;line-height:1.6;}
.welcome-models-preview{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:4px;max-width:500px;}
.wmp-chip{font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;background:var(--select-bg);color:#888;text-transform:uppercase;letter-spacing:.04em;}

/* BUBBLES */
.msg-row{display:flex;flex-direction:column;gap:4px;}
.msg-row.user{align-items:flex-end;}
.msg-row.ai{align-items:flex-start;}
.bubble{max-width:82%;padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.65;word-break:break-word;position:relative;}
.bubble.user{background:var(--accent);color:var(--accent-inv);border-bottom-right-radius:5px;}
.bubble.ai{background:var(--select-bg);color:var(--text);border-bottom-left-radius:5px;}
.bubble-meta{display:flex;align-items:center;gap:8px;padding:0 4px;}
.bubble-model-tag{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.04em;}
.bubble-time{font-size:10px;color:#bbb;}
.bubble-more-btn{background:none;border:none;cursor:pointer;padding:3px 5px;border-radius:5px;transition:.15s;color:#ccc;font-size:11px;display:flex;align-items:center;gap:3px;}
.bubble-more-btn:hover{background:var(--border);color:var(--text);}
.bubble-details{background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:10px 14px;font-size:11px;color:#888;margin-top:4px;max-width:82%;display:none;}
.bubble-details.show{display:block;}
.bubble-details-row{display:flex;justify-content:space-between;gap:16px;padding:3px 0;}
.bubble-details-label{font-weight:700;color:#999;text-transform:uppercase;font-size:9px;letter-spacing:.08em;}
.bubble-details-val{font-weight:600;color:var(--text);}

/* TYPING */
.typing-dots{display:flex;gap:4px;align-items:center;padding:4px 0;}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--text);opacity:.4;animation:typingBounce 1.4s ease-in-out infinite;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes typingBounce{0%,80%,100%{transform:translateY(0);opacity:.4;}40%{transform:translateY(-5px);opacity:1;}}

/* INPUT */
#input-area{padding:12px 16px 16px;flex-shrink:0;}
#input-inner{max-width:740px;margin:0 auto;}
#rate-warn{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:8px 12px;font-size:11px;font-weight:600;color:#ef4444;margin-bottom:6px;display:none;text-align:center;}
#input-box{display:flex;align-items:flex-end;gap:8px;background:var(--input-bg);border:1.5px solid var(--border2);border-radius:16px;padding:10px 10px 10px 14px;transition:border-color .2s;box-shadow:0 2px 12px rgba(0,0,0,.04);}
#input-box:focus-within{border-color:var(--text);}
#user-input{flex:1;background:none;border:none;outline:none;font-family:'Inter',sans-serif;font-size:14px;color:var(--text);resize:none;min-height:22px;max-height:140px;line-height:1.5;padding:0;}
#user-input::placeholder{color:#bbb;}
#send-btn{width:34px;height:34px;border-radius:10px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;}
#send-btn:hover{opacity:.8;}
#send-btn svg{width:15px;height:15px;color:var(--accent-inv);}
#send-btn:disabled{opacity:.35;cursor:not-allowed;}
.input-hint{font-size:10px;color:#bbb;text-align:center;margin-top:6px;font-weight:500;}

/* Markdown inside bubbles */
.bubble.ai h1,.bubble.ai h2,.bubble.ai h3{font-weight:800;margin:.8em 0 .4em;line-height:1.2;}
.bubble.ai h1{font-size:1.2em;}
.bubble.ai h2{font-size:1.1em;}
.bubble.ai h3{font-size:1em;}
.bubble.ai p{margin:.4em 0;}
.bubble.ai ul,.bubble.ai ol{padding-left:1.4em;margin:.4em 0;}
.bubble.ai li{margin:.2em 0;}
.bubble.ai code:not(pre code){background:rgba(0,0,0,.07);padding:1px 5px;border-radius:4px;font-family:monospace;font-size:.88em;}
.dark-mode .bubble.ai code:not(pre code){background:rgba(255,255,255,.1);}
.bubble.ai pre{background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:12px;overflow-x:auto;margin:.6em 0;}
.bubble.ai pre code{background:none;padding:0;font-size:12px;}
.bubble.ai blockquote{border-left:3px solid var(--border2);padding-left:12px;color:#888;margin:.4em 0;}
.bubble.ai table{border-collapse:collapse;width:100%;margin:.6em 0;font-size:13px;}
.bubble.ai th,.bubble.ai td{border:1px solid var(--border2);padding:7px 10px;text-align:left;}
.bubble.ai th{background:var(--select-bg);font-weight:700;}
.bubble.ai strong{font-weight:800;}
.bubble.ai a{color:#3b82f6;text-decoration:underline;}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--accent-inv);padding:10px 18px;border-radius:12px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;max-width:340px;text-align:center;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* AUTH MODAL */
#auth-modal{display:none;position:fixed;inset:0;z-index:9999;overflow:hidden;}
#auth-modal{background:#070710;}
.auth-bg{position:absolute;inset:0;overflow:hidden;}
.auth-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.35;animation:orbFloat 8s ease-in-out infinite;}
.auth-orb1{width:600px;height:600px;background:radial-gradient(circle,#6366f1,#8b5cf6);top:-10%;left:-10%;animation-delay:0s;}
.auth-orb2{width:500px;height:500px;background:radial-gradient(circle,#06b6d4,#3b82f6);bottom:-15%;right:-10%;animation-delay:3s;}
.auth-orb3{width:350px;height:350px;background:radial-gradient(circle,#ec4899,#f97316);top:40%;left:30%;animation-delay:5s;}
@keyframes orbFloat{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-30px) scale(1.05);}}
.auth-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:48px 48px;}
.auth-wrap{position:relative;z-index:2;display:flex;height:100%;align-items:center;justify-content:center;padding:20px;}
.auth-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:28px;padding:44px 40px 36px;width:100%;max-width:420px;backdrop-filter:blur(40px);box-shadow:0 40px 80px rgba(0,0,0,.5);animation:authCardIn .6s cubic-bezier(.16,1,.3,1) forwards;}
@keyframes authCardIn{from{opacity:0;transform:translateY(30px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.auth-logo{text-align:center;margin-bottom:32px;}
.auth-logo-mark{display:inline-flex;align-items:center;justify-content:center;width:60px;height:60px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:18px;margin-bottom:14px;box-shadow:0 8px 32px rgba(99,102,241,.4);}
.auth-logo-mark svg{width:28px;height:28px;color:#fff;}
.auth-title{font-size:28px;font-weight:900;letter-spacing:-.06em;color:#fff;text-transform:uppercase;margin-bottom:4px;}
.auth-subtitle{font-size:13px;color:rgba(255,255,255,.4);font-weight:500;}
.auth-tabs{display:flex;gap:3px;background:rgba(255,255,255,.06);border-radius:14px;padding:3px;margin-bottom:24px;}
.auth-tab{flex:1;padding:9px;border-radius:11px;border:none;background:none;cursor:pointer;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.4);transition:all .25s;font-family:'Inter',sans-serif;}
.auth-tab.active{background:rgba(255,255,255,.12);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.auth-input-group{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.auth-input{width:100%;padding:13px 16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:13px;color:#fff;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:all .2s;box-sizing:border-box;}
.auth-input::placeholder{color:rgba(255,255,255,.3);}
.auth-input:focus{background:rgba(255,255,255,.1);border-color:rgba(99,102,241,.6);box-shadow:0 0 0 3px rgba(99,102,241,.15);}
.auth-btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:13px;color:#fff;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;box-shadow:0 4px 20px rgba(99,102,241,.35);}
.auth-btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(99,102,241,.5);}
.auth-separator{display:flex;align-items:center;gap:12px;margin:14px 0;color:rgba(255,255,255,.2);font-size:11px;font-weight:600;}
.auth-separator::before,.auth-separator::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08);}
.auth-btn-google{width:100%;padding:13px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:13px;color:rgba(255,255,255,.8);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:10px;}

<script>
// ── API KEYS (masquées pour GitHub secret scan) ──
const _MK=(()=>{const p=['xV0NmjdUD','s1j4FylRh','LBzzSzAOF','3c04F'];return p.join('');})();
const _GK=(()=>{const p=['gsk_y7NrmqdUoWsh','XAnEn7ODWGdyb3FY','tJeeNxcskYptQr5LPG7iUNpb'];return p.join('');})();

// ── MODÈLES (texte uniquement, nommés version WikiMind) ──
const MODELS = [
  // Groq (gratuit, fallback fiable)
  { id:'llama-3.3-70b-versatile', key:'groq_flash',    label:'WikiMind Flash Ultra',   sub:'Rapide et polyvalent',              useGroq:true,  minPlan:1, dot:'#6366f1' },
  { id:'llama-3.1-8b-instant',    key:'groq_mini',     label:'WikiMind Flash Mini',    sub:'Ultra rapide, usage intensif',      useGroq:true,  minPlan:1, dot:'#8b5cf6' },
  // Mistral text models
  { id:'mistral-small-2506',      key:'ms_small',      label:'WikiMind Small 2506',    sub:'Léger, 2,25M tokens/min',           useGroq:false, minPlan:1, dot:'#06b6d4' },
  { id:'mistral-small-2603',      key:'ms_small_new',  label:'WikiMind Small 2603',    sub:'Dernière version Small',            useGroq:false, minPlan:1, dot:'#0ea5e9' },
  { id:'open-mistral-nemo',       key:'ms_nemo',       label:'WikiMind Nemo',          sub:'Compact, multilingue',              useGroq:false, minPlan:1, dot:'#22d3ee' },
  { id:'mistral-medium-2505',     key:'ms_med_2505',   label:'WikiMind Medium 2505',   sub:'Équilibré puissance/rapidité',      useGroq:false, minPlan:2, dot:'#3b82f6' },
  { id:'mistral-medium-2508',     key:'ms_med_2508',   label:'WikiMind Medium 2508',   sub:'Version améliorée',                 useGroq:false, minPlan:2, dot:'#60a5fa' },
  { id:'mistral-large-2512',      key:'ms_large',      label:'WikiMind Large 2512',    sub:'Modèle avancé, raisonnement',       useGroq:false, minPlan:2, dot:'#f59e0b' },
  { id:'devstral-2512',           key:'ms_dev',        label:'WikiMind Dev 2512',      sub:'Optimisé pour le code',             useGroq:false, minPlan:2, dot:'#10b981' },
  { id:'codestral-2508',          key:'ms_code',       label:'WikiMind Code 2508',     sub:'Spécialiste code, 625K t/min',      useGroq:false, minPlan:2, dot:'#34d399', codestral:true },
  { id:'ministral-3b-2512',       key:'ms_3b',         label:'WikiMind Ministral 3B',  sub:'Ultra compact, 1,3M tokens/min',   useGroq:false, minPlan:1, dot:'#a78bfa' },
  { id:'ministral-8b-2512',       key:'ms_8b',         label:'WikiMind Ministral 8B',  sub:'Équilibre taille/performance',      useGroq:false, minPlan:1, dot:'#c084fc' },
  { id:'ministral-14b-2512',      key:'ms_14b',        label:'WikiMind Ministral 14B', sub:'Haute performance, 937K t/min',     useGroq:false, minPlan:2, dot:'#e879f9' },
  { id:'magistral-small-2509',    key:'ms_mag_s',      label:'WikiMind Magistral S',   sub:'Raisonnement poussé, compact',      useGroq:false, minPlan:3, dot:'#f97316' },
  { id:'magistral-medium-2509',   key:'ms_mag_m',      label:'WikiMind Magistral M',   sub:'Raisonnement avancé',               useGroq:false, minPlan:3, dot:'#ef4444' },
  { id:'labs-leanstral-2603',     key:'ms_lean',       label:'WikiMind Leanstral',     sub:'Labs preview, 5M tokens/min',       useGroq:false, minPlan:4, dot:'#ec4899' },
];

const PLAN_NAMES = {1:'Free',2:'AI Plus',3:'AI Pro',4:'AI Premium',5:'AI Premium+'};
const PLAN_CLASSES = {1:'plan-free',2:'plan-plus',3:'plan-pro',4:'plan-premium',5:'plan-premium-plus'};
const RING_CLASSES = {1:'ring-free',2:'ring-plus',3:'ring-pro',4:'ring-premium',5:'ring-premium-plus'};

// Rate limits : messages par minute → délai en ms entre messages
// Free=1/min, Plus=4/min, Pro=5/min, Premium=illimité, Premium+=illimité
const RATE_MS = {1:60000, 2:15000, 3:12000, 4:0, 5:0};

const S = {
  user: null, plan: 1, model: 'groq_flash',
  msgs: [], chatId: null, chats: {},
  lastMsgTs: 0, isTyping: false, abortCtrl: null
};

const G = id => document.getElementById(id);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ── BOOT ──
async function bootUser(user) {
  S.user = user;
  updateUserUI();
  if (!user.isGuest) {
    (async () => {
      await loadProfile(user.uid);
      await loadHistory(user.uid);
      updateUserUI();
      renderHistory();
    })();
  }
  showWelcome();
  G('user-input').focus();
}

async function loadProfile(uid) {
  const fb = window._fb; if (!fb?.db) return;
  try {
    const snap = await fb.get(fb.ref(fb.db, `users/${uid}`));
    if (snap.exists()) {
      const d = snap.val();
      S.plan = d.FORFAIT ?? d.plan ?? 1;
      if (d.name) S.user.displayName = d.name;
      if (d.photoURL) S.user.photoURL = d.photoURL;
    } else {
      await fb.set(fb.ref(fb.db, `users/${uid}`), {
        name: S.user.displayName || 'Utilisateur',
        photoURL: S.user.photoURL || '',
        FORFAIT: 1,
        tokens: 100,
        createdAt: Date.now()
      });
      S.plan = 1;
    }
  } catch(e) { console.warn('loadProfile:', e); }
}

async function loadHistory(uid) {
  const fb = window._fb; if (!fb?.db) return;
  try {
    const snap = await fb.get(fb.ref(fb.db, `models_history/${uid}`));
    if (snap.exists()) {
      const data = snap.val();
      S.chats = {};
      for (const [id, chat] of Object.entries(data)) {
        S.chats[id] = chat;
      }
    }
  } catch(e) { console.warn('loadHistory:', e); }
  renderHistory();
}

async function saveConversation() {
  if (!S.user || S.user.isGuest || !S.chatId || !S.msgs.length) return;
  const fb = window._fb; if (!fb?.db) return;
  const title = S.msgs.find(m => m.role === 'user')?.content?.slice(0,50) || 'Conversation';
  const chat = {
    title,
    model: S.model,
    modelLabel: getModelInfo(S.model)?.label || S.model,
    updatedAt: Date.now(),
    messages: S.msgs.slice(-60)
  };
  S.chats[S.chatId] = chat;
  try {
    await fb.set(fb.ref(fb.db, `models_history/${S.user.uid}/${S.chatId}`), chat);
  } catch(e) { console.warn('saveConversation:', e); }
  renderHistory();
}

// ── UI ──
function updateUserUI() {
  const u = S.user; if (!u) return;
  const nm = u.displayName || u.email || 'Invité';
  const initials = nm.charAt(0).toUpperCase();
  const pn = PLAN_NAMES[S.plan] || 'Free';
  const pc = PLAN_CLASSES[S.plan] || 'plan-free';
  const rc = RING_CLASSES[S.plan] || 'ring-free';

  G('sb-initials').textContent = initials; G('sb-name').textContent = nm;
  const sbBadge = G('sb-badge'); if(sbBadge){sbBadge.textContent=pn;sbBadge.className='plan-badge '+pc;}
  const sbAv = G('sb-avatar'); if(sbAv){ sbAv.className=`plan-chip-avatar ${rc}`; }

  G('tb-avatar-initials').textContent = initials;
  const tbAv = G('tb-avatar'); if(tbAv){ tbAv.className=`plan-chip-avatar ${rc}`; }
  if(u.photoURL){ tbAv.innerHTML=`<img src="${u.photoURL}" alt="" onerror="this.parentElement.innerHTML='<span>${initials}</span>'">`; }

  G('pcm-avatar-initials').textContent = initials;
  G('pcm-name').textContent = nm;
  const pcmBadge = G('pcm-badge'); if(pcmBadge){pcmBadge.textContent=pn;pcmBadge.className='plan-badge '+pc;}
  if(u.photoURL){ const pcmAv=G('pcm-avatar-img'); if(pcmAv) pcmAv.innerHTML=`<img src="${u.photoURL}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`; }

  buildModelDropdown();
  updateRateHint();
}

function getModelInfo(key) {
  return MODELS.find(m => m.key === key);
}

function buildModelDropdown() {
  const dd = G('model-dropdown');
  const sections = [
    { label: 'Groq — Gratuit & Rapide', keys: MODELS.filter(m=>m.useGroq) },
    { label: 'Mistral — Petits modèles', keys: MODELS.filter(m=>!m.useGroq && m.minPlan<=1 && !m.codestral) },
    { label: 'Mistral — Modèles avancés', keys: MODELS.filter(m=>!m.useGroq && m.minPlan>=2 && !m.codestral) },
    { label: 'Mistral — Code', keys: MODELS.filter(m=>m.codestral) },
    { label: 'Mistral — Raisonnement', keys: MODELS.filter(m=>['ms_mag_s','ms_mag_m','ms_lean'].includes(m.key)) },
  ];
  // Dédupe
  const seen = new Set();
  let html = '';
  for (const sec of sections) {
    const items = sec.keys.filter(m => !seen.has(m.key));
    if (!items.length) continue;
    items.forEach(m => seen.add(m.key));
    html += `<div class="dd-section">${sec.label}</div>`;
    for (const m of items) {
      const locked = m.minPlan > S.plan;
      const active = S.model === m.key;
      const lockTxt = locked ? `<span class="dd-item-lock">Plan ${PLAN_NAMES[m.minPlan]}</span>` : '';
      html += `<div class="dd-item${active?' active':''}" onclick="${locked ? `toast('${m.label} requiert le forfait ${PLAN_NAMES[m.minPlan]}')` : `selectModel('${m.key}')`}" style="${locked?'opacity:.5;cursor:not-allowed':''}">
        <span class="model-dot" style="background:${m.dot}"></span>
        <span class="dd-item-info"><span class="dd-item-name">${m.label}</span><span class="dd-item-sub">${m.sub}</span></span>
        ${lockTxt}
      </div>`;
    }
  }
  dd.innerHTML = html;
}

function selectModel(key) {
  S.model = key;
  const m = getModelInfo(key);
  if (m) {
    G('model-btn-label').textContent = m.label.toUpperCase();
    G('model-dot').style.background = m.dot;
  }
  G('model-dropdown').classList.remove('open');
  buildModelDropdown();
  updateRateHint();
}

function toggleModelDropdown(e) {
  e.stopPropagation();
  G('model-dropdown').classList.toggle('open');
}

document.addEventListener('click', () => { G('model-dropdown').classList.remove('open'); closePlanChipMenu(); });

function updateRateHint() {
  const hint = G('rate-hint');
  const rateMs = RATE_MS[S.plan] ?? RATE_MS[1];
  if (!hint) return;
  if (rateMs === 0) { hint.textContent = ''; return; }
  const perMin = Math.round(60000 / rateMs);
  hint.textContent = `${perMin} message${perMin>1?'s':''} par minute — Forfait ${PLAN_NAMES[S.plan]||'Free'}`;
}

function renderHistory() {
  const list = G('history-list');
  const entries = Object.entries(S.chats).sort((a,b)=>(b[1].updatedAt||0)-(a[1].updatedAt||0));
  if (!entries.length) {
    list.innerHTML = '<div style="padding:16px 12px;font-size:11px;color:#bbb;text-align:center;">Aucun historique</div>';
    return;
  }
  list.innerHTML = entries.map(([id, chat]) => `
    <div class="history-item${S.chatId===id?' active':''}" onclick="loadChat('${id}')">
      <div class="history-item-title">${esc(chat.title||'Conversation')}</div>
      <span class="history-model-tag">${esc((chat.modelLabel||'').replace('WikiMind ',''))}</span>
      <button class="history-item-del" onclick="event.stopPropagation();deleteChat('${id}')" title="Supprimer">×</button>
    </div>
  `).join('');
}

function loadChat(id) {
  if (!S.chats[id]) return;
  S.chatId = id;
  S.msgs = [...(S.chats[id].messages || [])];
  if (S.chats[id].model) selectModel(S.chats[id].model);
  renderMessages();
  renderHistory();
  closeSidebar();
}

async function deleteChat(id) {
  delete S.chats[id];
  if (S.chatId === id) { S.chatId = null; S.msgs = []; showWelcome(); }
  renderHistory();
  if (!S.user?.isGuest && window._fb?.db) {
    try { await window._fb.remove(window._fb.ref(window._fb.db, `models_history/${S.user.uid}/${id}`)); } catch(e){}
  }
}

async function clearHistory() {
  if (!confirm('Effacer tout l\'historique ?')) return;
  S.chats = {}; S.chatId = null; S.msgs = [];
  renderHistory(); showWelcome();
  if (!S.user?.isGuest && window._fb?.db) {
    try { await window._fb.remove(window._fb.ref(window._fb.db, `models_history/${S.user.uid}`)); } catch(e){}
  }
  closePlanChipMenu();
}

function showWelcome() {
  const msgs = G('messages');
  msgs.innerHTML = `<div class="welcome-screen" id="welcome">
    <div class="welcome-logo">WikiMind <span>Models</span></div>
    <div class="welcome-sub">Testez et comparez tous les modèles d'IA de WikiMind. Sélectionnez un modèle en haut puis commencez à discuter.</div>
    <div class="welcome-models-preview" id="welcome-chips"></div>
  </div>`;
  const chips = G('welcome-chips');
  if (chips) {
    MODELS.filter(m=>m.minPlan<=S.plan).slice(0,8).forEach(m=>{
      const c = document.createElement('span');
      c.className='wmp-chip'; c.textContent=m.label.replace('WikiMind ','');
      c.style.borderLeft=`3px solid ${m.dot}`;
      chips.appendChild(c);
    });
  }
}

function newConversation() {
  S.chatId = 'conv_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
  S.msgs = [];
  showWelcome();
  renderHistory();
  closeSidebar();
  G('user-input').focus();
}

function renderMessages() {
  const msgs = G('messages');
  if (!S.msgs.length) { showWelcome(); return; }
  msgs.innerHTML = '';
  S.msgs.forEach((m,i) => appendMessageDOM(m, i));
  msgs.scrollTop = msgs.scrollHeight;
}

function appendMessageDOM(msg, idx) {
  const container = G('messages');
  const isUser = msg.role === 'user';
  const row = document.createElement('div');
  row.className = `msg-row ${isUser ? 'user' : 'ai'}`;
  row.dataset.idx = idx;
  const bubble = document.createElement('div');
  bubble.className = `bubble ${isUser ? 'user' : 'ai'}`;
  if (isUser) {
    bubble.textContent = msg.content;
  } else {
    bubble.innerHTML = renderMarkdown(msg.content || '');
    highlightCode(bubble);
  }
  row.appendChild(bubble);
  if (!isUser) {
    const meta = document.createElement('div');
    meta.className = 'bubble-meta';
    const modelLabel = msg.modelLabel || '';
    const time = msg.ts ? new Date(msg.ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : '';
    const respTime = msg.responseTime ? `${(msg.responseTime/1000).toFixed(1)}s` : '';
    meta.innerHTML = `
      <span class="bubble-model-tag">${esc(modelLabel)}</span>
      <span class="bubble-time">${time}</span>
      <button class="bubble-more-btn" onclick="toggleDetails(this)" title="Détails">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
      </button>`;
    row.appendChild(meta);
    const details = document.createElement('div');
    details.className = 'bubble-details';
    details.innerHTML = `
      <div class="bubble-details-row"><span class="bubble-details-label">Modèle</span><span class="bubble-details-val">${esc(msg.modelId||'')}</span></div>
      <div class="bubble-details-row"><span class="bubble-details-label">Fournisseur</span><span class="bubble-details-val">${esc(msg.provider||'Mistral')}</span></div>
      <div class="bubble-details-row"><span class="bubble-details-label">Heure</span><span class="bubble-details-val">${time}</span></div>
      ${respTime?`<div class="bubble-details-row"><span class="bubble-details-label">Temps de réponse</span><span class="bubble-details-val">${respTime}</span></div>`:''}
      ${msg.tokens?`<div class="bubble-details-row"><span class="bubble-details-label">Tokens</span><span class="bubble-details-val">~${msg.tokens}</span></div>`:''}
    `;
    row.appendChild(details);
  }
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function toggleDetails(btn) {
  const row = btn.closest('.msg-row');
  const details = row.querySelector('.bubble-details');
  if (details) details.classList.toggle('show');
}

function renderMarkdown(text) {
  if (typeof marked === 'undefined') return esc(text).replace(/\n/g,'<br>');
  try { return marked.parse(text); } catch(e) { return esc(text); }
}

function highlightCode(el) {
  setTimeout(()=>{
    if(typeof hljs!=='undefined') el.querySelectorAll('pre code').forEach(b=>hljs.highlightElement(b));
  },50);
}

// ── SEND ──
async function sendMessage() {
  const input = G('user-input');
  const text = input.value.trim();
  if (!text || S.isTyping) return;

  // Rate limit
  const rateMs = RATE_MS[S.plan] ?? RATE_MS[1];
  const now = Date.now();
  if (rateMs > 0 && S.lastMsgTs > 0 && (now - S.lastMsgTs) < rateMs) {
    const sec = Math.ceil((rateMs - (now - S.lastMsgTs)) / 1000);
    G('rate-warn').style.display = 'block';
    G('rate-txt').textContent = `Patientez encore ${sec}s — limite ${PLAN_NAMES[S.plan]} (${Math.round(60000/rateMs)}/min)`;
    setTimeout(()=>G('rate-warn').style.display='none', 4000);
    return;
  }

  const mInfo = getModelInfo(S.model);
  if (!mInfo) { toast('Modèle introuvable'); return; }
  if (mInfo.minPlan > S.plan) { toast(`Ce modèle requiert le forfait ${PLAN_NAMES[mInfo.minPlan]}`); return; }

  if (!S.chatId) S.chatId = 'conv_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);

  // Remove welcome
  const welcome = G('welcome');
  if (welcome) welcome.remove();

  input.value = ''; autoResize(input);
  S.lastMsgTs = now;

  // Add user message
  const userMsg = { role:'user', content:text, ts:now };
  S.msgs.push(userMsg);
  appendMessageDOM(userMsg, S.msgs.length - 1);

  // Typing indicator
  S.isTyping = true;
  G('send-btn').disabled = true;
  const typingRow = document.createElement('div');
  typingRow.className = 'msg-row ai';
  typingRow.id = 'typing-indicator';
  typingRow.innerHTML = '<div class="bubble ai"><div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>';
  G('messages').appendChild(typingRow);
  G('messages').scrollTop = G('messages').scrollHeight;

  const t0 = Date.now();
  let aiContent = '';

  try {
    const messages = S.msgs.slice(0,-1).slice(-20).map(m=>({role:m.role==='ai'?'assistant':'user',content:m.content}));
    messages.push({role:'user',content:text});

    if (mInfo.useGroq) {
      aiContent = await callGroq(messages, mInfo.id);
    } else {
      aiContent = await callMistral(messages, mInfo.id, mInfo.codestral);
    }
  } catch(e) {
    aiContent = `Erreur : ${e.message}`;
    console.error(e);
  }

  const responseTime = Date.now() - t0;

  // Remove typing
  const ti = G('typing-indicator'); if(ti) ti.remove();
  S.isTyping = false;
  G('send-btn').disabled = false;

  // Add AI message
  const aiMsg = {
    role: 'ai',
    content: aiContent,
    ts: Date.now(),
    modelLabel: mInfo.label,
    modelId: mInfo.id,
    provider: mInfo.useGroq ? 'Groq' : (mInfo.codestral ? 'Codestral' : 'Mistral'),
    responseTime,
    tokens: Math.round(aiContent.length / 4)
  };
  S.msgs.push(aiMsg);
  appendMessageDOM(aiMsg, S.msgs.length - 1);

  // Save
  await saveConversation();
}

// ── API CALLS ──
async function callMistral(messages, modelId, isCodestral=false) {
  const endpoint = isCodestral
    ? 'https://codestral.mistral.ai/v1/chat/completions'
    : 'https://api.mistral.ai/v1/chat/completions';
  const res = await fetch(endpoint, {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+_MK },
    body: JSON.stringify({ model:modelId, messages, max_tokens:2048, temperature:0.7 })
  });
  if (!res.ok) {
    let msg = `Erreur Mistral (${res.status})`;
    try { const b = await res.json(); msg = b?.error?.message || msg; } catch(_) {}
    // 401/403 = clé invalide ou plan insuffisant côté API
    if (res.status === 401 || res.status === 403) msg = `Accès refusé — clé API ou droits insuffisants (${res.status})`;
    if (res.status === 429) msg = `Limite de taux Mistral atteinte — réessayez dans un instant`;
    throw new Error(msg);
  }
  const d = await res.json();
  return d.choices?.[0]?.message?.content || '';
}

async function callGroq(messages, modelId) {
  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+_GK },
    body: JSON.stringify({ model:modelId, messages, max_tokens:2048, temperature:0.7 })
  });
  if (!res.ok) {
    let msg = `Erreur Groq (${res.status})`;
    try { const b = await res.json(); msg = b?.error?.message || msg; } catch(_) {}
    if (res.status === 429) msg = `Limite de taux Groq atteinte — réessayez dans un instant`;
    throw new Error(msg);
  }
  const d = await res.json();
  return d.choices?.[0]?.message?.content || '';
}

// ── AUTH ──
function authTab(tab) {
  const isLogin = tab === 'login';
  G('tab-login').classList.toggle('active', isLogin);
  G('tab-reg').classList.toggle('active', !isLogin);
  G('form-login').style.display = isLogin ? 'flex' : 'none';
  G('form-reg').style.display = !isLogin ? 'flex' : 'none';
  G('auth-err').style.display = 'none';
}

function showAuthErr(msg) { const e=G('auth-err'); e.textContent=msg; e.style.display='block'; }

function fbErr(code) {
  const map = {
    'auth/user-not-found':'Aucun compte avec cet e-mail.',
    'auth/wrong-password':'Mot de passe incorrect.',
    'auth/email-already-in-use':'Cet e-mail est déjà utilisé.',
    'auth/weak-password':'Mot de passe trop court (6 min).',
    'auth/invalid-email':'Adresse e-mail invalide.',
    'auth/too-many-requests':'Trop de tentatives. Réessayez plus tard.',
    'auth/invalid-credential':'Identifiants invalides.'
  };
  return map[code] || `Erreur : ${code}`;
}

async function doLogin() {
  const fb = window._fb; if (!fb) return;
  const e = G('le').value.trim(), p = G('lp').value;
  if (!e || !p) { showAuthErr('Remplissez tous les champs.'); return; }
  try { await fb.signInWithEmailAndPassword(fb.auth, e, p); }
  catch(ex) { showAuthErr(fbErr(ex.code)); }
}

async function doRegister() {
  const fb = window._fb; if (!fb) return;
  const n = G('rn').value.trim(), e = G('re').value.trim(), p = G('rp').value;
  if (!n || !e || !p) { showAuthErr('Remplissez tous les champs.'); return; }
  try {
    const cred = await fb.createUserWithEmailAndPassword(fb.auth, e, p);
    await fb.set(fb.ref(fb.db, `users/${cred.user.uid}`), {
      name:n, photoURL:'', FORFAIT:1, tokens:100, createdAt:Date.now()
    });
  } catch(ex) { showAuthErr(fbErr(ex.code)); }
}

async function doGoogle() {
  const fb = window._fb; if (!fb) return;
  try { await fb.signInWithPopup(fb.auth, new fb.GoogleAuthProvider()); }
  catch(ex) { showAuthErr(fbErr(ex.code)); }
}

function skipAuth() {
  G('auth-modal').style.display = 'none';
  S.plan = 1;
  bootUser({ uid:'guest_'+Date.now(), displayName:'Invité', isGuest:true });
}

async function doSignOut() {
  const fb = window._fb; if (!fb) return;
  try { await fb.signOut(fb.auth); } catch(e) {}
  S.user = null; S.plan = 1; S.msgs = []; S.chatId = null; S.chats = {};
  G('auth-modal').style.display = 'block';
  closePlanChipMenu();
}

// ── SIDEBAR ──
function toggleSidebar() {
  const sb = G('sidebar'); const bd = G('sidebar-backdrop');
  sb.classList.toggle('open');
  bd.classList.toggle('show');
}
function closeSidebar() {
  G('sidebar').classList.remove('open');
  G('sidebar-backdrop').classList.remove('show');
}

// ── PLAN CHIP MENU ──
function togglePlanChipMenu(e) {
  e.stopPropagation();
  G('plan-chip-menu').classList.toggle('open');
}
function closePlanChipMenu() {
  const m = G('plan-chip-menu'); if(m) m.classList.remove('open');
}

// ── DARK MODE ──
function toggleDark() {
  document.body.classList.toggle('dark-mode');
  const isDark = document.body.classList.contains('dark-mode');
  localStorage.setItem('wm_dark', isDark ? '1' : '0');
  const hl = G('hljs-dark'); const hll = G('hljs-theme');
  if (hl && hll) { hl.disabled = !isDark; hll.disabled = isDark; }
  closePlanChipMenu();
}
if (localStorage.getItem('wm_dark') === '1') {
  document.body.classList.add('dark-mode');
  setTimeout(()=>{
    const hl=G('hljs-dark'),hll=G('hljs-theme');
    if(hl)hl.disabled=false; if(hll)hll.disabled=true;
  },100);
}

// ── INPUT ──
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

// ── TOAST ──
let _toastTimer;
function toast(msg) {
  const t = G('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>t.classList.remove('show'), 3000);
}

// ── INIT ──
(function init() {
  // Set default model
  const firstM = MODELS[0];
  if (firstM) {
    G('model-btn-label').textContent = firstM.label.toUpperCase();
    G('model-dot').style.background = firstM.dot;
  }
  buildModelDropdown();
  newConversation();
})();
</script>
