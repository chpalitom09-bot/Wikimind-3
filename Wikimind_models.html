<style>
:root {
  --bg:#ffffff; --text:#111111; --sidebar:#fcfcfc;
  --border:#f0f0f0; --border2:#e5e7eb;
  --bubble-user:#555555; --input-bg:#ffffff;
  --select-bg:#f3f4f6; --card-hover:#f9fafb;
  --accent:#111111; --accent-inv:#ffffff;
}
.dark-mode {
  --bg:#0f0f0f; --text:#eeeeee; --sidebar:#161616;
  --border:#252525; --border2:#2d2d2d;
  --bubble-user:#aaaaaa; --input-bg:#1a1a1a;
  --select-bg:#2a2a2a; --card-hover:#1f1f1f;
  --accent:#ffffff; --accent-inv:#111111;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;}

/* UI SIDEBAR */
#sidebar{width:280px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:50;transition:margin .3s;}
.sb-header{padding:24px 20px 16px;border-bottom:1px solid var(--border);}
.sb-logo h1{font-size:18px;font-weight:900;letter-spacing:-.04em;text-transform:uppercase;font-style:italic;}
.sb-nav{padding:16px 12px;display:flex;flex-direction:column;gap:4px;}
.sb-btn{width:100%;padding:10px 14px;border-radius:12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;border:none;background:none;color:var(--text);}
.sb-btn:hover{background:var(--select-bg);}
.sb-btn.primary{background:var(--accent);color:var(--accent-inv);}
#history-list{flex:1;overflow-y:auto;padding:0 10px 10px;}
.history-item{display:flex;align-items:center;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:12px;color:#888;gap:8px;transition:.2s;}
.history-item:hover{background:var(--border);color:var(--text);}
.history-item.active{background:var(--select-bg);color:var(--text);}
.history-item-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.history-item-del{opacity:0;cursor:pointer;}
.history-item:hover .history-item-del{opacity:1;}
.sb-bottom{padding:14px 12px;border-top:1px solid var(--border);}

/* USER PLANS & RINGS */
.plan-badge{font-size:9px;font-weight:800;text-transform:uppercase;padding:2px 6px;border-radius:20px;letter-spacing:.04em;}
.plan-free{background:#f3f4f6;color:#6b7280;}
.plan-plus{background:#dbeafe;color:#1d4ed8;}
.plan-pro{background:#ede9fe;color:#7c3aed;}
.plan-premium{background:#fef3c7;color:#d97706;}
.plan-premium-plus{background:linear-gradient(135deg,#fee2e2,#fef3c7);color:#c2410c;}
.dark-mode .plan-free{background:#27272a;color:#a1a1aa;}
.dark-mode .plan-plus{background:#1e3a5f;color:#60a5fa;}
.dark-mode .plan-pro{background:#3b1f5e;color:#c084fc;}
.dark-mode .plan-premium{background:#44330f;color:#fbbf24;}
.dark-mode .plan-premium-plus{background:linear-gradient(135deg,#44110f,#44330f);color:#fb923c;}

.plan-chip-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--text);position:relative;}
.plan-chip-avatar::after{content:'';position:absolute;inset:-3px;border-radius:50%;z-index:0;}
.plan-chip-avatar::before{content:'';position:absolute;inset:2px;border-radius:50%;z-index:1;background:var(--bg);}
.plan-chip-avatar > span {position:relative; z-index:2;}
.ring-free::after{background:conic-gradient(#9ca3af,#d1d5db,#9ca3af);}
.ring-plus::after{background:conic-gradient(#111,#555,#111,#555,#111);animation:ringRotate 4s linear infinite;}
.dark-mode .ring-plus::after{background:conic-gradient(#fff,#aaa,#fff,#aaa,#fff);animation:ringRotate 4s linear infinite;}
.ring-pro::after{background:conic-gradient(#22c55e,#4ade80,#16a34a,#86efac,#22c55e);animation:ringRotate 3s linear infinite;}
.ring-premium::after{background:conic-gradient(#f59e0b,#fcd34d,#d97706,#fef08a,#f59e0b);animation:ringRotate 2.5s linear infinite;}
.ring-premium-plus::after{background:conic-gradient(#ef4444,#f97316,#eab308,#f97316,#ef4444);animation:ringRotateFire 1.8s linear infinite;}
@keyframes ringRotate{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes ringRotateFire{0%{transform:rotate(0deg);filter:brightness(1);}50%{transform:rotate(180deg);filter:brightness(1.3);}100%{transform:rotate(360deg);filter:brightness(1);}}

/* CHAT AREA */
#main-area{flex:1;display:flex;flex-direction:column;position:relative;background:var(--bg);}
#chat-container{flex:1;overflow-y:auto;padding:80px 2rem 150px;max-width:900px;margin:0 auto;width:100%;scroll-behavior:smooth;}
.chat-bubble{max-width:88%;padding:.9rem 0;line-height:1.75;font-size:1rem;}
.chat-bubble.user{background:var(--accent);color:var(--accent-inv);padding:1rem 1.2rem;border-radius:18px 18px 4px 18px;margin-left:auto;}
.chat-bubble.model{color:var(--text);margin-right:auto;width:100%;}
.chat-bubble.model pre {background:var(--select-bg);padding:1rem;border-radius:8px;overflow-x:auto;}
.chat-bubble.model code {font-family:monospace;font-size:0.9em;}

/* INPUT */
#input-wrapper{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);width:92%;max-width:760px;z-index:40;}
#input-box{background:var(--input-bg);border:1px solid var(--border2);border-radius:24px;box-shadow:0 20px 50px rgba(0,0,0,.07);display:flex;flex-direction:column;}
#user-input{width:100%;padding:18px 20px 12px 20px;background:transparent;color:var(--text);outline:none;resize:none;font-size:1rem;font-family:'Inter',sans-serif;}
.input-footer{display:flex;justify-content:space-between;align-items:center;padding:8px 16px 14px;}
#model-select{appearance:none;background:var(--select-bg);border:1px solid var(--border2);padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;color:var(--text);cursor:pointer;outline:none;}
#send-btn{background:var(--accent);color:var(--accent-inv);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;}
#send-btn:disabled{opacity:0.4;cursor:not-allowed;}

/* TYPING & METADATA */
.typing-dots{display:flex;gap:5px;align-items:center;padding:12px 0;}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--text);opacity:.3;animation:dotBounce 1.4s infinite;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes dotBounce{0%,80%,100%{transform:translateY(0);opacity:.3;}40%{transform:translateY(-5px);opacity:1;}}

.msg-actions{display:flex;gap:4px;padding-top:8px;margin-bottom:24px;}
.action-btn{background:none;border:none;color:#bbb;cursor:pointer;position:relative;}
.action-btn:hover{color:var(--text);}
.msg-details-popup{display:none;position:absolute;bottom:25px;left:0;background:var(--bg);border:1px solid var(--border2);border-radius:10px;padding:10px;box-shadow:0 8px 24px rgba(0,0,0,.1);min-width:200px;z-index:100;text-align:left;}
.msg-details-popup.open{display:block;}
.detail-line{font-size:11px;color:var(--text);margin-bottom:4px;}
.detail-label{font-weight:800;color:#888;text-transform:uppercase;}

/* TOAST */
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;opacity:0;transition:.3s;pointer-events:none;z-index:9999;}
#toast.show{opacity:1;}

/* AUTH MODAL */
#auth-modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9999;display:flex;align-items:center;justify-content:center;}
.auth-card{background:#111;border:1px solid #333;padding:40px;border-radius:20px;width:100%;max-width:400px;}
.auth-input{width:100%;padding:12px;margin-bottom:10px;background:#222;border:1px solid #444;color:#fff;border-radius:8px;outline:none;}
.auth-btn{width:100%;padding:12px;background:#fff;color:#000;font-weight:bold;border-radius:8px;border:none;cursor:pointer;}
</style>
</head>

  <div id="top-bar" style="position:absolute;top:20px;right:20px;z-index:10;">

<script>
// --- OBFUSCATED API KEYS ---
const _MK = (()=>{const p=['xV0NmjdU','Ds1j4Fyl','RhLBzzSz','AOF3c04F'];return p.join('');})();
const _GK = (()=>{const p=['gsk_y7NrmqdUoWshXAn','En7ODWGdyb3FYtJee','NxcskYptQr5LPG7iUNpb'];return p.join('');})();

// --- MODELS DEFINITION ---
const MODELS = {
  // Mistral Text Models
  'codestral-2508': { name: 'Wikimind Code 2508', provider: 'mistral' },
  'devstral-2512': { name: 'Wikimind Devstral 2512', provider: 'mistral' },
  'labs-leanstral-2603': { name: 'Wikimind Leanstral Labs', provider: 'mistral' },
  'magistral-medium-2509': { name: 'Wikimind Magistral Medium', provider: 'mistral' },
  'magistral-small-2509': { name: 'Wikimind Magistral Small', provider: 'mistral' },
  'ministral-14b-2512': { name: 'Wikimind Ministral 14B', provider: 'mistral' },
  'ministral-3b-2512': { name: 'Wikimind Ministral 3B', provider: 'mistral' },
  'ministral-8b-2512': { name: 'Wikimind Ministral 8B', provider: 'mistral' },
  'mistral-large-2512': { name: 'Wikimind Large 2512', provider: 'mistral' },
  'mistral-medium-2505': { name: 'Wikimind Medium 2505', provider: 'mistral' },
  'mistral-medium-2508': { name: 'Wikimind Medium 2508', provider: 'mistral' },
  'mistral-medium-3-5': { name: 'Wikimind Medium 3.5', provider: 'mistral' },
  'mistral-small-2506': { name: 'Wikimind Small 2506', provider: 'mistral' },
  'mistral-small-2603': { name: 'Wikimind Small 2603', provider: 'mistral' },
  'open-mistral-nemo': { name: 'Wikimind Nemo Open', provider: 'mistral' },
  
  // Groq Models
  'llama-3.3-70b-versatile': { name: 'Wikimind Llama 70B (Ultra)', provider: 'groq' },
  'mixtral-8x7b-32768': { name: 'Wikimind Mixtral 8x7B', provider: 'groq' }
};

// --- STATE ---
let S = {
  user: null,
  plan: 1, // 1:Free, 2:Plus, 3:Pro, 4:Premium, 5:Premium+
  chatId: null,
  msgs: [],
  history: {},
  rateHistory: []
};

// --- INIT UI ---
function populateModels() {
  const sel = document.getElementById('model-select');
  Object.keys(MODELS).forEach(id => {
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = MODELS[id].name;
    sel.appendChild(opt);
  });
}
populateModels();

// --- AUTH & USER ---
async function doLogin() {
  const e = document.getElementById('auth-email').value;
  const p = document.getElementById('auth-password').value;
  try { await window._fb.signInWithEmailAndPassword(window._fb.auth, e, p); } 
  catch (err) { alert(err.message); }
}

async function doRegister() {
  const e = document.getElementById('auth-email').value;
  const p = document.getElementById('auth-password').value;
  try { 
    const cred = await window._fb.createUserWithEmailAndPassword(window._fb.auth, e, p); 
    // Enregistrement du FORFAIT dans la base auth (wikimind-3-comments)
    await window._fb.set(window._fb.ref(window._fb.authDb, `users/${cred.user.uid}/FORFAIT`), 1);
  } catch (err) { alert(err.message); }
}

async function doLogout() {
  await window._fb.signOut(window._fb.auth);
  window.location.reload();
}

async function bootUser(user) {
  S.user = user;
  document.getElementById('u-name').textContent = user.email.split('@')[0];
  document.getElementById('u-initial').textContent = user.email.charAt(0).toUpperCase();
  
  // Fetch Plan depuis l'authDb (wikimind-3-comments)
  const snapPlan = await window._fb.get(window._fb.ref(window._fb.authDb, `users/${user.uid}/FORFAIT`));
  S.plan = snapPlan.exists() ? parseInt(snapPlan.val()) : 1;
  updatePlanUI();
  
  loadHistory();
}

function updatePlanUI() {
  const plans = {1:['Free','plan-free','ring-free'], 2:['AI Plus','plan-plus','ring-plus'], 3:['AI Pro','plan-pro','ring-pro'], 4:['AI Premium','plan-premium','ring-premium'], 5:['Premium+','plan-premium-plus','ring-premium-plus']};
  const [lbl, badge, ring] = plans[S.plan] || plans[1];
  const pEl = document.getElementById('u-plan');
  pEl.textContent = lbl;
  pEl.className = 'plan-badge ' + badge;
  document.getElementById('u-ring').className = 'plan-chip-avatar ' + ring;
}

// Fonction purement pour tester sur cette page
function upgradePlanMock() {
  S.plan = S.plan < 5 ? S.plan + 1 : 1;
  window._fb.set(window._fb.ref(window._fb.authDb, `users/${S.user.uid}/FORFAIT`), S.plan);
  updatePlanUI();
  toast("Plan simulé vers " + document.getElementById('u-plan').textContent);
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// --- HISTORY LOGIC (Utilise histDb - wikimindmodels) ---
async function loadHistory() {
  const snap = await window._fb.get(window._fb.ref(window._fb.histDb, `users/${S.user.uid}/conversations`));
  if (snap.exists()) S.history = snap.val();
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  list.innerHTML = Object.entries(S.history).sort((a,b) => b[1].updatedAt - a[1].updatedAt).map(([id, c]) => `
    <div class="history-item ${id === S.chatId ? 'active' : ''}" onclick="openChat('${id}')">
      <span class="history-item-title">${c.title || 'Conversation'}</span>
      <span class="history-item-del" onclick="event.stopPropagation(); deleteChat('${id}')">✕</span>
    </div>
  `).join('');
}

function newChat() {
  S.chatId = null;
  S.msgs = [];
  document.getElementById('chat-container').innerHTML = '<div id="welcome" style="text-align:center;margin-top:20vh;color:#888;"><h2 style="font-size:32px;font-weight:900;color:var(--text);">Testez les modèles</h2></div>';
  renderHistory();
}

function openChat(id) {
  S.chatId = id;
  S.msgs = S.history[id].messages || [];
  const cc = document.getElementById('chat-container');
  cc.innerHTML = '';
  S.msgs.forEach(m => renderMsgToDOM(m));
  renderHistory();
}

function deleteChat(id) {
  delete S.history[id];
  window._fb.remove(window._fb.ref(window._fb.histDb, `users/${S.user.uid}/conversations/${id}`));
  if(S.chatId === id) newChat();
  renderHistory();
}

// --- CHAT LOGIC ---
function checkRateLimit() {
  const limits = {1: 1, 2: 4, 3: 5, 4: Infinity, 5: Infinity};
  const max = limits[S.plan] || 1;
  if (max === Infinity) return true;
  
  const now = Date.now();
  S.rateHistory = S.rateHistory.filter(t => now - t < 60000); // Garde les messages de la dernière minute
  
  if (S.rateHistory.length >= max) {
    toast(`Limite atteinte (${max} msg/min). Attendez ou passez au forfait supérieur.`);
    return false;
  }
  S.rateHistory.push(now);
  return true;
}

async function sendMsg() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;
  
  if (!checkRateLimit()) return;

  const modelId = document.getElementById('model-select').value;
  input.value = '';
  document.getElementById('welcome')?.remove();

  const userMsg = { role: 'user', content: text, ts: Date.now() };
  S.msgs.push(userMsg);
  renderMsgToDOM(userMsg);

  if (!S.chatId) {
    S.chatId = 'chat_' + Date.now();
    S.history[S.chatId] = { title: text.substring(0, 30) + '...', messages: S.msgs, updatedAt: Date.now() };
  }

  const typingId = 'typing_' + Date.now();
  const cc = document.getElementById('chat-container');
  cc.insertAdjacentHTML('beforeend', `<div id="${typingId}" class="chat-bubble model"><div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`);
  cc.scrollTop = cc.scrollHeight;

  const startTime = Date.now();
  let aiContent = "";
  
  try {
    const apiMessages = S.msgs.map(m => ({ role: m.role, content: m.content }));
    const provider = MODELS[modelId].provider;
    
    let endpoint, key;
    if (provider === 'mistral') {
      endpoint = 'https://api.mistral.ai/v1/chat/completions';
      key = _MK;
    } else {
      endpoint = 'https://api.groq.com/openai/v1/chat/completions';
      key = _GK;
    }

    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify({ model: modelId, messages: apiMessages, max_tokens: 2000 })
    });

    if (!res.ok) throw new Error("Erreur API " + res.status);
    const data = await res.json();
    aiContent = data.choices[0].message.content;

  } catch (err) {
    aiContent = "Erreur : " + err.message;
  }

  const responseTime = ((Date.now() - startTime) / 1000).toFixed(2);
  document.getElementById(typingId).remove();

  const aiMsg = { 
    role: 'assistant', 
    content: aiContent, 
    model: MODELS[modelId].name, 
    ts: Date.now(),
    responseTime: responseTime
  };
  
  S.msgs.push(aiMsg);
  renderMsgToDOM(aiMsg);

  // Sauvegarde Firebase sur HistDb (wikimindmodels)
  S.history[S.chatId].messages = S.msgs;
  S.history[S.chatId].updatedAt = Date.now();
  window._fb.set(window._fb.ref(window._fb.histDb, `users/${S.user.uid}/conversations/${S.chatId}`), S.history[S.chatId]);
  renderHistory();
}

function renderMsgToDOM(msg) {
  const cc = document.getElementById('chat-container');
  const wrap = document.createElement('div');
  wrap.style.position = 'relative';
  
  const div = document.createElement('div');
  div.className = 'chat-bubble ' + (msg.role === 'user' ? 'user' : 'model');
  
  if (msg.role === 'assistant') {
    div.innerHTML = marked.parse(msg.content);
    // Menu 3 petits points (Détails)
    const detailId = 'det_' + Math.random().toString(36).substr(2,6);
    const dateStr = new Date(msg.ts).toLocaleTimeString('fr-FR');
    const actions = document.createElement('div');
    actions.className = 'msg-actions';
    actions.innerHTML = `
      <button class="action-btn" onclick="document.getElementById('${detailId}').classList.toggle('open')">
        <span style="font-weight:900;letter-spacing:1px;">···</span>
      </button>
      <div id="${detailId}" class="msg-details-popup">
        <div class="detail-line"><span class="detail-label">Modèle :</span> ${msg.model}</div>
        <div class="detail-line"><span class="detail-label">Heure :</span> ${dateStr}</div>
        <div class="detail-line"><span class="detail-label">Temps de réponse :</span> ${msg.responseTime} s</div>
      </div>
    `;
    wrap.appendChild(div);
    wrap.appendChild(actions);
  } else {
    div.textContent = msg.content;
    wrap.appendChild(div);
  }
  
  cc.appendChild(wrap);
  
  // Highlight JS
  wrap.querySelectorAll('pre code').forEach(b => { try{hljs.highlightElement(b);}catch(e){} });
  cc.scrollTop = cc.scrollHeight;
}

// Close details popup on click outside
document.addEventListener('click', e => {
  if(!e.target.closest('.action-btn') && !e.target.closest('.msg-details-popup')){
    document.querySelectorAll('.msg-details-popup').forEach(p => p.classList.remove('open'));
  }
});
</script>
</body>
</html>
