<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WikiMind Writer</title>

    <!-- Tailwind & Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Space Grotesk', 'sans-serif'] },
                    colors: {
                        glass: { panel: 'rgba(20, 20, 20, 0.6)', border: 'rgba(255, 255, 255, 0.08)' },
                        brand: { 500: '#6366f1', 600: '#4f46e5', glow: '#818cf8' },
                        office: { writer: '#3b82f6' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: #ffffff; overflow: hidden; } /* Prevent global scroll to act like an app */
        .glass-panel {
            background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        
        /* Editor Styles */
        #editor-container { overflow-y: auto; height: calc(100vh - 130px); scroll-behavior: smooth; }
        .document-page {
            background: #ffffff; /* Page blanche pour le contraste comme LibreOffice */
            color: #000000;
            min-height: 1056px; /* Format A4 approx */
            max-width: 816px;
            margin: 20px auto;
            padding: 96px; /* Marges de document standard */
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            outline: none;
            transition: all 0.3s ease;
        }
        
        /* Typography inside editor */
        .document-page p { margin-bottom: 1em; line-height: 1.6; }
        .document-page h1 { font-size: 2.5em; font-weight: bold; margin-bottom: 0.5em; }
        .document-page h2 { font-size: 2em; font-weight: bold; margin-bottom: 0.5em; }
        .document-page h3 { font-size: 1.5em; font-weight: bold; margin-bottom: 0.5em; }
        .document-page ul { list-style-type: disc; margin-left: 2em; margin-bottom: 1em; }
        .document-page ol { list-style-type: decimal; margin-left: 2em; margin-bottom: 1em; }
        .document-page a { color: #3b82f6; text-decoration: underline; }
        .document-page img { max-width: 100%; height: auto; display: block; margin: 1em 0; }

        /* Toolbar styles */
        .toolbar-btn {
            padding: 6px 10px; border-radius: 6px; color: rgba(255,255,255,0.7); transition: all 0.2s;
        }
        .toolbar-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .toolbar-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.1); margin: 0 8px; }
        .toolbar-select {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
            color: white; padding: 4px 8px; font-size: 12px; cursor: pointer;
        }
        .toolbar-select option { background: #1a1a1a; color: white; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

        /* AI Typing Animation */
        .ai-typing span {
            display: inline-block; width: 4px; height: 4px; background-color: currentColor;
            border-radius: 50%; animation: typing 1.4s infinite both; margin: 0 2px;
        }
        .ai-typing span:nth-child(1) { animation-delay: 0s; }
        .ai-typing span:nth-child(2) { animation-delay: 0.2s; }
        .ai-typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body class="selection:bg-office-writer selection:text-white flex flex-col h-screen">

    <!-- AURORA BG -->
    <canvas id="aurora-bg" class="fixed top-0 left-0 w-full h-full -z-10"></canvas>

    <!-- TOP NAVBAR (App Header) -->
    <header class="glass-panel border-b border-white/10 px-4 py-3 flex items-center justify-between z-50 shrink-0">
        <div class="flex items-center gap-4">
            <a href="Wikimind_office.html" class="w-8 h-8 rounded-lg hover:bg-white/10 flex items-center justify-center text-white/60 hover:text-white transition-colors">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded bg-office-writer/20 text-office-writer flex items-center justify-center text-lg shadow-[0_0_15px_rgba(59,130,246,0.5)]">
                    <i class="fa-solid fa-file-word"></i>
                </div>
                <div>
                    <input type="text" id="doc-name" value="Chargement..." class="bg-transparent text-white font-bold text-sm focus:outline-none focus:border-b border-brand-500 w-64 px-1">
                    <div class="flex items-center gap-2 mt-0.5 text-[10px] text-white/40">
                        <span id="save-status"><i class="fa-solid fa-cloud-arrow-up mr-1"></i> Synchronisé</span>
                        <span>•</span>
                        <span id="word-count">0 mots</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="px-4 py-1.5 rounded-full bg-brand-600/20 text-brand-glow border border-brand-500/30 text-xs font-bold hover:bg-brand-600/40 transition-colors flex items-center gap-2">
                <i class="fa-solid fa-wand-magic-sparkles"></i> WikiMind AI
            </button>
            <img id="nav-avatar" src="https://ui-avatars.com/api/?name=Guest&background=333&color=fff" class="w-8 h-8 rounded-full border border-white/20 object-cover">
        </div>
    </header>

    <!-- TOOLBAR -->
    <div class="bg-[#121212] border-b border-white/10 px-4 py-2 flex flex-wrap items-center gap-1 shrink-0 z-40 relative">
        <!-- History -->
        <button class="toolbar-btn" onclick="formatDoc('undo')" title="Annuler"><i class="fa-solid fa-rotate-left"></i></button>
        <button class="toolbar-btn" onclick="formatDoc('redo')" title="Rétablir"><i class="fa-solid fa-rotate-right"></i></button>
        <div class="toolbar-divider"></div>

        <!-- Font -->
        <select class="toolbar-select" onchange="formatDoc('fontName', this.value)" title="Police">
            <option value="Inter">Inter (Defaut)</option>
            <option value="Arial">Arial</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Courier New">Courier New</option>
            <option value="Georgia">Georgia</option>
        </select>
        <select class="toolbar-select" onchange="formatDoc('fontSize', this.value)" title="Taille">
            <option value="1">Très petit</option>
            <option value="2">Petit</option>
            <option value="3" selected>Normal</option>
            <option value="4">Moyen</option>
            <option value="5">Grand</option>
            <option value="6">Très Grand</option>
            <option value="7">Titre énorme</option>
        </select>
        <div class="toolbar-divider"></div>

        <!-- Formatting -->
        <button class="toolbar-btn font-bold" onclick="formatDoc('bold')" title="Gras">G</button>
        <button class="toolbar-btn italic" onclick="formatDoc('italic')" title="Italique">I</button>
        <button class="toolbar-btn underline" onclick="formatDoc('underline')" title="Souligné">S</button>
        <button class="toolbar-btn line-through" onclick="formatDoc('strikeThrough')" title="Barré">abc</button>
        <div class="toolbar-divider"></div>

        <!-- Colors -->
        <div class="relative group flex items-center">
            <label class="text-white/60 text-xs mr-2"><i class="fa-solid fa-font"></i></label>
            <input type="color" onchange="formatDoc('foreColor', this.value)" title="Couleur du texte" class="w-6 h-6 p-0 border-0 bg-transparent cursor-pointer">
        </div>
        <div class="relative group flex items-center ml-2">
            <label class="text-white/60 text-xs mr-2"><i class="fa-solid fa-fill"></i></label>
            <input type="color" onchange="formatDoc('hiliteColor', this.value)" title="Surlignage" value="#ffffff" class="w-6 h-6 p-0 border-0 bg-transparent cursor-pointer">
        </div>
        <div class="toolbar-divider"></div>

        <!-- Alignment -->
        <button class="toolbar-btn" onclick="formatDoc('justifyLeft')" title="Aligner à gauche"><i class="fa-solid fa-align-left"></i></button>
        <button class="toolbar-btn" onclick="formatDoc('justifyCenter')" title="Centrer"><i class="fa-solid fa-align-center"></i></button>
        <button class="toolbar-btn" onclick="formatDoc('justifyRight')" title="Aligner à droite"><i class="fa-solid fa-align-right"></i></button>
        <button class="toolbar-btn" onclick="formatDoc('justifyFull')" title="Justifier"><i class="fa-solid fa-align-justify"></i></button>
        <div class="toolbar-divider"></div>

        <!-- Lists & Indent -->
        <button class="toolbar-btn" onclick="formatDoc('insertUnorderedList')" title="Liste à puces"><i class="fa-solid fa-list-ul"></i></button>
        <button class="toolbar-btn" onclick="formatDoc('insertOrderedList')" title="Liste numérotée"><i class="fa-solid fa-list-ol"></i></button>
        <button class="toolbar-btn" onclick="formatDoc('outdent')" title="Diminuer le retrait"><i class="fa-solid fa-outdent"></i></button>
        <button class="toolbar-btn" onclick="formatDoc('indent')" title="Augmenter le retrait"><i class="fa-solid fa-indent"></i></button>
        <div class="toolbar-divider"></div>

        <!-- Insert -->
        <button class="toolbar-btn" onclick="addLink()" title="Insérer un lien"><i class="fa-solid fa-link"></i></button>
        <button class="toolbar-btn" onclick="addImage()" title="Insérer une image"><i class="fa-solid fa-image"></i></button>
        <button class="toolbar-btn" onclick="formatDoc('removeFormat')" title="Effacer le formatage"><i class="fa-solid fa-eraser"></i></button>
    </div>

    <!-- MAIN WORKSPACE -->
    <div class="flex flex-1 overflow-hidden relative">
        
        <!-- Document Area -->
        <main id="editor-container" class="flex-1 relative w-full" onclick="document.getElementById('editor').focus()">
            <div id="editor" contenteditable="true" class="document-page font-sans text-[11pt]" spellcheck="false">
                <!-- Content loaded here -->
            </div>
        </main>

        <!-- AI Sidebar (Hidden by default) -->
        <aside id="ai-sidebar" class="w-80 bg-black/80 border-l border-white/10 backdrop-blur-xl flex flex-col shrink-0 transition-transform duration-300 transform translate-x-full absolute right-0 top-0 h-full z-30 shadow-2xl">
            <div class="p-4 border-b border-white/10 flex justify-between items-center bg-brand-500/10">
                <h3 class="font-display font-bold text-brand-glow flex items-center gap-2">
                    <i class="fa-solid fa-robot"></i> WikiMind AI
                </h3>
                <button onclick="toggleSidebar()" class="text-white/40 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <div class="p-4 overflow-y-auto flex-1 text-sm space-y-6">
                <!-- Info -->
                <div class="text-xs text-white/50 bg-white/5 p-3 rounded-lg border border-white/10 leading-relaxed">
                    Sélectionnez du texte dans votre document et choisissez une action pour que l'IA vous assiste.
                </div>

                <!-- Actions -->
                <div class="space-y-2">
                    <p class="text-xs font-bold uppercase tracking-wider text-white/40 mb-3">Actions rapides</p>
                    <button onclick="processAI('corriger')" class="w-full text-left px-4 py-2.5 rounded-lg bg-white/5 hover:bg-office-writer/20 border border-white/5 hover:border-office-writer/50 transition-all flex items-center gap-3 group">
                        <i class="fa-solid fa-spell-check text-office-writer group-hover:scale-110 transition-transform"></i> Corriger (Orthographe)
                    </button>
                    <button onclick="processAI('reformuler_pro')" class="w-full text-left px-4 py-2.5 rounded-lg bg-white/5 hover:bg-green-500/20 border border-white/5 hover:border-green-500/50 transition-all flex items-center gap-3 group">
                        <i class="fa-solid fa-briefcase text-green-400 group-hover:scale-110 transition-transform"></i> Reformuler (Pro)
                    </button>
                    <button onclick="processAI('developper')" class="w-full text-left px-4 py-2.5 rounded-lg bg-white/5 hover:bg-purple-500/20 border border-white/5 hover:border-purple-500/50 transition-all flex items-center gap-3 group">
                        <i class="fa-solid fa-expand text-purple-400 group-hover:scale-110 transition-transform"></i> Développer l'idée
                    </button>
                    <button onclick="processAI('resumer')" class="w-full text-left px-4 py-2.5 rounded-lg bg-white/5 hover:bg-orange-500/20 border border-white/5 hover:border-orange-500/50 transition-all flex items-center gap-3 group">
                        <i class="fa-solid fa-compress text-orange-400 group-hover:scale-110 transition-transform"></i> Résumer
                    </button>
                </div>

                <!-- AI Response Area -->
                <div id="ai-response-container" class="hidden flex-col gap-2">
                    <p class="text-xs font-bold uppercase tracking-wider text-brand-glow">Réponse de l'IA</p>
                    <div id="ai-output" class="p-3 bg-black/50 border border-brand-500/30 rounded-lg text-white/80 whitespace-pre-wrap min-h-[100px] text-sm leading-relaxed">
                        <!-- Output -->
                    </div>
                    <div class="flex gap-2 mt-2">
                        <button onclick="replaceSelectionWithAI()" class="flex-1 bg-brand-600 hover:bg-brand-500 text-white py-1.5 rounded-lg text-xs font-bold transition">Remplacer</button>
                        <button onclick="insertAIBelow()" class="flex-1 bg-white/10 hover:bg-white/20 text-white py-1.5 rounded-lg text-xs font-bold transition">Insérer en bas</button>
                    </div>
                </div>

                <!-- Custom Prompt -->
                <div class="pt-4 border-t border-white/10">
                    <p class="text-xs font-bold uppercase tracking-wider text-white/40 mb-2">Demande personnalisée</p>
                    <textarea id="ai-custom-prompt" rows="3" placeholder="Ex: Traduis ce texte en anglais..." class="w-full bg-black/40 border border-white/10 rounded-lg p-3 text-xs text-white focus:outline-none focus:border-brand-500 resize-none"></textarea>
                    <button onclick="processAI('custom')" class="mt-2 w-full bg-white/10 hover:bg-brand-600 text-white py-2 rounded-lg text-xs font-bold transition">Générer</button>
                </div>
            </div>
        </aside>
    </div>

    <!-- FIREBASE & LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyD6qIOtKSx0Sl1Ht_a6ppLiMdKZRCc75tA",
            authDomain: "wikimind-3-comments.firebaseapp.com",
            databaseURL: "https://wikimind-3-comments-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "wikimind-3-comments",
            storageBucket: "wikimind-3-comments.firebasestorage.app",
            messagingSenderId: "137479541640",
            appId: "1:137479541640:web:4ed2510a9908055052e03d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // APP STATE
        let currentUser = null;
        let fileId = new URLSearchParams(window.location.search).get('id');
        let source = new URLSearchParams(window.location.search).get('source');
        let saveTimeout = null;
        let isSaving = false;
        
        // MISTRAL API KEY
        const MISTRAL_API_KEY = "SIf4f6UfrvZYKRTBcgcwvLq1Xi8888k9";

        // DOM ELEMENTS
        const editor = document.getElementById('editor');
        const docNameInput = document.getElementById('doc-name');
        const saveStatus = document.getElementById('save-status');
        const wordCountDisplay = document.getElementById('word-count');
        const navAvatar = document.getElementById('nav-avatar');

        // Prevent toolbar buttons from stealing focus from editor
        document.querySelectorAll('.toolbar-btn').forEach(btn => {
            btn.addEventListener('mousedown', (e) => e.preventDefault());
        });

        // 1. INIT & AUTH
        if (!fileId) {
            alert("Erreur: Aucun fichier spécifié.");
            window.location.href = "Wikimind_office.html";
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                navAvatar.src = user.photoURL || `https://ui-avatars.com/api/?name=${user.email}&background=3b82f6&color=fff`;
            }
            loadDocument();
        });

        // 2. LOAD DOCUMENT
        function loadDocument() {
            if (source === 'firebase' && currentUser) {
                const docRef = ref(db, `users/${currentUser.uid}/files/${fileId}`);
                get(docRef).then((snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        docNameInput.value = data.name || "Sans titre";
                        editor.innerHTML = data.content || "";
                        updateWordCount();
                    } else {
                        alert("Fichier introuvable sur le Cloud.");
                    }
                });
            } else if (source === 'local') {
                const raw = localStorage.getItem('wikimind_guest_files');
                const files = raw ? JSON.parse(raw) : {};
                if (files[fileId]) {
                    docNameInput.value = files[fileId].name || "Sans titre";
                    editor.innerHTML = files[fileId].content || "";
                    updateWordCount();
                } else {
                    alert("Fichier introuvable en local.");
                }
            } else if (source === 'firebase' && !currentUser) {
                // Not authenticated yet, waiting for Auth state
            }
        }

        // 3. AUTO-SAVE LOGIC
        function triggerSave() {
            updateWordCount();
            saveStatus.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1"></i> Enregistrement...';
            saveStatus.className = "text-yellow-400";
            
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(saveDocument, 1000); // 1 sec debounce
        }

        editor.addEventListener('input', triggerSave);
        docNameInput.addEventListener('input', triggerSave);

        async function saveDocument() {
            if (isSaving) return;
            isSaving = true;

            const content = editor.innerHTML;
            const name = docNameInput.value.trim() || "Sans titre";
            const timestamp = Date.now();

            try {
                if (source === 'firebase' && currentUser) {
                    await update(ref(db, `users/${currentUser.uid}/files/${fileId}`), {
                        content: content,
                        name: name,
                        updatedAt: timestamp
                    });
                } else if (source === 'local') {
                    const raw = localStorage.getItem('wikimind_guest_files');
                    let files = raw ? JSON.parse(raw) : {};
                    if (files[fileId]) {
                        files[fileId].content = content;
                        files[fileId].name = name;
                        files[fileId].updatedAt = timestamp;
                        localStorage.setItem('wikimind_guest_files', JSON.stringify(files));
                    }
                }
                
                saveStatus.innerHTML = '<i class="fa-solid fa-check mr-1"></i> Sauvegardé';
                saveStatus.className = "text-green-400";
            } catch (error) {
                console.error("Erreur sauvegarde:", error);
                saveStatus.innerHTML = '<i class="fa-solid fa-triangle-exclamation mr-1"></i> Erreur';
                saveStatus.className = "text-red-400";
            } finally {
                isSaving = false;
            }
        }

        // 4. EDITOR FORMATTING
        window.formatDoc = (cmd, value = null) => {
            document.execCommand(cmd, false, value);
            editor.focus();
            triggerSave();
        };

        window.addLink = () => {
            const url = prompt("Entrez l'URL du lien :");
            if (url) formatDoc('createLink', url);
        };

        window.addImage = () => {
            const url = prompt("Entrez l'URL de l'image :");
            if (url) formatDoc('insertImage', url);
        };

        function updateWordCount() {
            const text = editor.innerText.trim();
            const count = text === "" ? 0 : text.split(/\s+/).length;
            wordCountDisplay.innerText = `${count} mot${count > 1 ? 's' : ''}`;
        }

        // 5. WIKIMIND AI LOGIC
        window.toggleSidebar = () => {
            const sidebar = document.getElementById('ai-sidebar');
            if (sidebar.classList.contains('translate-x-full')) {
                sidebar.classList.remove('translate-x-full');
            } else {
                sidebar.classList.add('translate-x-full');
            }
        };

        let lastSelectedRange = null;
        let lastAIOutput = "";

        // Save selection before clicking AI buttons
        editor.addEventListener('mouseup', saveSelection);
        editor.addEventListener('keyup', saveSelection);

        function saveSelection() {
            const selection = window.getSelection();
            if (selection.rangeCount > 0) {
                lastSelectedRange = selection.getRangeAt(0);
            }
        }

        window.processAI = async (action) => {
            const selection = window.getSelection();
            let text = selection.toString().trim();
            
            if (!text && action !== 'custom') {
                alert("Veuillez sélectionner du texte dans le document d'abord.");
                return;
            }

            const outputContainer = document.getElementById('ai-response-container');
            const outputBox = document.getElementById('ai-output');
            outputContainer.classList.remove('hidden');
            outputContainer.classList.add('flex');
            
            outputBox.innerHTML = '<div class="ai-typing"><span></span><span></span><span></span></div> WikiMind AI réfléchit...';

            let prompt = "";
            const customInput = document.getElementById('ai-custom-prompt').value;

            switch(action) {
                case 'corriger':
                    prompt = `Tu es WikiMind AI, l'assistant d'un traitement de texte. Corrige uniquement les fautes d'orthographe, de grammaire et de typographie du texte suivant. Ne rajoute aucun commentaire, renvoie juste le texte corrigé :\n\n"${text}"`;
                    break;
                case 'reformuler_pro':
                    prompt = `Tu es WikiMind AI. Reformule le texte suivant pour qu'il ait un ton très professionnel, soutenu et clair. Ne rajoute pas de blabla, juste la reformulation :\n\n"${text}"`;
                    break;
                case 'developper':
                    prompt = `Tu es WikiMind AI. Développe l'idée du texte suivant en ajoutant des arguments ou des détails pertinents (environ 2 paragraphes). Garde le même ton :\n\n"${text}"`;
                    break;
                case 'resumer':
                    prompt = `Tu es WikiMind AI. Résume le texte suivant de manière concise et factuelle :\n\n"${text}"`;
                    break;
                case 'custom':
                    text = text ? `\n\nTexte de base : "${text}"` : "";
                    prompt = `Tu es WikiMind AI. ${customInput} ${text}`;
                    break;
            }

            try {
                const response = await fetch('https://api.mistral.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${MISTRAL_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'mistral-small-latest',
                        messages: [{ role: 'user', content: prompt }]
                    })
                });

                if (!response.ok) throw new Error("Erreur de connexion à l'IA");

                const data = await response.json();
                lastAIOutput = data.choices[0].message.content.trim();
                
                // Effet machine à écrire
                outputBox.innerHTML = "";
                let i = 0;
                const typingEffect = setInterval(() => {
                    outputBox.innerHTML += lastAIOutput.charAt(i);
                    i++;
                    if (i >= lastAIOutput.length) clearInterval(typingEffect);
                }, 10);

            } catch (error) {
                console.error(error);
                outputBox.innerHTML = "<span class='text-red-400'>Erreur : Impossible de contacter WikiMind AI. Vérifiez votre connexion.</span>";
            }
        };

        window.replaceSelectionWithAI = () => {
            if (!lastAIOutput || !lastSelectedRange) return;
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(lastSelectedRange);
            document.execCommand('insertText', false, lastAIOutput);
            triggerSave();
        };

        window.insertAIBelow = () => {
            if (!lastAIOutput || !lastSelectedRange) return;
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(lastSelectedRange);
            // On se place à la fin de la sélection
            selection.collapseToEnd();
            // On insère un saut de ligne puis le texte
            document.execCommand('insertHTML', false, `<br><br>${lastAIOutput}`);
            triggerSave();
        };

        // AURORA BACKGROUND
        const canvas = document.getElementById('aurora-bg');
        if(canvas) {
            const ctx = canvas.getContext('2d');
            let width, height;
            const orbs = [
                { x: 0.3, y: 0.3, r: 0.5, color: 'rgba(59, 130, 246, 0.12)', vx: 0.0003, vy: 0.0004 },
                { x: 0.7, y: 0.6, r: 0.6, color: 'rgba(79, 70, 229, 0.1)', vx: -0.0004, vy: 0.0003 }
            ];
            function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
            function animate() {
                ctx.clearRect(0, 0, width, height);
                ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, width, height);
                orbs.forEach(orb => {
                    orb.x += orb.vx; orb.y += orb.vy;
                    if(orb.x < -0.2 || orb.x > 1.2) orb.vx *= -1;
                    if(orb.y < -0.2 || orb.y > 1.2) orb.vy *= -1;
                    const g = ctx.createRadialGradient(orb.x * width, orb.y * height, 0, orb.x * width, orb.y * height, orb.r * width);
                    g.addColorStop(0, orb.color); g.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = g; ctx.fillRect(0, 0, width, height);
                });
                requestAnimationFrame(animate);
            }
            window.addEventListener('resize', resize); resize(); animate();
        }

        // Initial format (to ensure text inside editor is wrapped in paragraphs)
        document.execCommand('defaultParagraphSeparator', false, 'p');

    </script>
</body>
